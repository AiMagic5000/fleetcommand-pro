            const downloadCSV = (report) => {
                let csv = report.headers.join(',') + '\n';
                report.rows.forEach(row => { csv += row.map(c => `"${c}"`).join(',') + '\n'; });
                if (report.summary.length) { csv += '\n' + report.summary.join('\n'); }
                const blob = new Blob([csv], { type: 'text/csv' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${report.title.replace(/\s+/g, '_')}_${report.generated}.csv`; a.click();
                toast('Report downloaded as CSV', 'success');
            };

            const printReport = (report) => {
                const w = window.open('', '_blank');
                let html = `<html><head><title>${report.title}</title><style>body{font-family:Arial,sans-serif;padding:24px;max-width:1000px;margin:0 auto}h1{font-size:20px;margin-bottom:4px}h2{font-size:13px;color:#666;margin-bottom:16px}.company{font-size:12px;color:#888;margin-bottom:8px}.summary{display:flex;gap:20px;margin-bottom:16px;flex-wrap:wrap}.summary-item{background:#f0f4f8;padding:8px 14px;border-radius:6px;font-size:13px;font-weight:600}table{width:100%;border-collapse:collapse;margin-top:12px}th,td{padding:8px 12px;border:1px solid #ddd;text-align:left;font-size:12px}th{background:#f0f0f0;font-weight:600}.footer{margin-top:20px;font-size:10px;color:#999}@media print{body{padding:0}}</style></head><body>`;
                html += `<h1>${report.title}</h1><div class="company">${COMPANY.fullName} | ${COMPANY.dot} | ${COMPANY.mc}</div><h2>Period: ${report.period} | Generated: ${report.generated}</h2>`;
                if (report.summary.length) {
                    html += '<div class="summary">';
                    report.summary.forEach(s => { html += `<div class="summary-item">${s}</div>`; });
                    html += '</div>';
                }
                html += '<table><thead><tr>';
                report.headers.forEach(h => { html += `<th>${h}</th>`; });
                html += '</tr></thead><tbody>';
                report.rows.forEach(row => { html += '<tr>'; row.forEach(c => { html += `<td>${c}</td>`; }); html += '</tr>'; });
                html += '</tbody></table>';
                html += `<div class="footer">Generated by FleetCommand Pro on ${new Date().toLocaleString()}</div><div style="margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.08);font-size:12px;color:#64748b;line-height:1.6;text-align:center;max-width:700px;margin-left:auto;margin-right:auto">FleetCommand Pro software is owned and operated by <a href="https://startmybusiness.us" style="color:#94a3b8">Start My Business Inc.</a> -- <a href="https://getfleetcommand.com" style="color:#94a3b8">getfleetcommand.com</a></div>
<div style="margin:16px 0;display:flex;align-items:center;justify-content:center;gap:12px">
<img src="fleet-marker.png" alt="FleetCommand Pro" style="height:40px;width:auto">
<span style="color:#94a3b8;font-size:13px">Proudly Powered by <a href="https://getfleetcommand.com" style="color:#ff9800;font-weight:600">FleetCommand Pro</a> Software</span>
</div>
</body></html>`;
                w.document.write(html); w.document.close(); w.print();
            };

            const reportLabels = { revenue: 'Revenue', mileage: 'Mileage', driver: 'Driver Performance', fleet: 'Fleet Utilization', customer: 'Customer Analysis', expense: 'Expense', profit: 'Profit & Loss', ifta: 'IFTA Summary' };

            return (<div className="page"><div className="grid-2" style={{gridTemplateColumns:'1fr 2fr'}}>
                <div className="card"><div className="card-header"><h3>Generate Report</h3></div><div className="card-body">
                    <div className="form-group"><label className="form-label">Report Type</label><select className="form-select" value={reportType} onChange={e => setReportType(e.target.value)}><option value="revenue">Revenue Report</option><option value="mileage">Mileage Report</option><option value="driver">Driver Performance</option><option value="fleet">Fleet Utilization</option><option value="customer">Customer Analysis</option><option value="expense">Expense Report</option><option value="profit">Profit & Loss</option><option value="ifta">IFTA Summary</option></select></div>
                    <div className="form-group"><label className="form-label">Date Range</label><select className="form-select" value={dateRange} onChange={e => setDateRange(e.target.value)}><option value="week">This Week</option><option value="month">This Month</option><option value="quarter">This Quarter</option><option value="year">This Year</option><option value="custom">Custom Range</option></select></div>
                    {dateRange === 'custom' && <div className="form-row"><div className="form-group"><label className="form-label">Start</label><input type="date" className="form-input" value={startDate} onChange={e => setStartDate(e.target.value)} /></div><div className="form-group"><label className="form-label">End</label><input type="date" className="form-input" value={endDate} onChange={e => setEndDate(e.target.value)} /></div></div>}
                    <button className="btn btn-primary" style={{width:'100%',marginTop:8}} onClick={generateReport}>Generate Report</button>
                    <div style={{marginTop:16,padding:12,background:'#f7fafc',borderRadius:6,fontSize:11,color:'#4a5568'}}><strong>Tip:</strong> Reports use your actual fleet data. Revenue reports pull from invoices, mileage from loads, driver performance cross-references loads per driver, and expense estimates use industry per-mile costs.</div>
                </div></div>
                <div>
                    {viewingReport && <div className="card" style={{marginBottom:16}}><div className="card-header"><h3>{viewingReport.title}</h3><div style={{display:'flex',gap:8}}>
                        <button className="btn btn-secondary" onClick={() => printReport(viewingReport)}><Icons.Print /> Print</button>
                        <button className="btn btn-primary" onClick={() => downloadCSV(viewingReport)}><Icons.Download /> Download CSV</button>
                        <button className="btn btn-secondary" onClick={() => setViewingReport(null)}>Close</button>
                    </div></div>
                    <div className="card-body">
                        <div style={{fontSize:12,color:'#718096',marginBottom:8}}>Period: {viewingReport.period} | Generated: {viewingReport.generated}</div>
                        {viewingReport.summary.length > 0 && <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:14}}>{viewingReport.summary.map((s,i) => <div key={i} style={{background:'#ebf4ff',padding:'6px 12px',borderRadius:6,fontSize:12,fontWeight:600,color:'#1a365d'}}>{s}</div>)}</div>}
                        <table><thead><tr>{viewingReport.headers.map((h,i) => <th key={i}>{h}</th>)}</tr></thead><tbody>{viewingReport.rows.map((row,i) => <tr key={i}>{row.map((c,j) => <td key={j} style={row[0]==='NET PROFIT'?{fontWeight:700,fontSize:14}:row[0]==='---'?{borderBottom:'2px solid #1a365d',padding:2}:{}}>{c === '---' ? '' : c}</td>)}</tr>)}</tbody></table>
                    </div></div>}
                    <div className="card"><div className="card-header"><h3>Generated Reports</h3></div>
                    {generatedReports.length === 0 ? <div className="card-body" style={{textAlign:'center',color:'#718096',padding:40,fontSize:13}}>No reports generated yet. Select a report type and click Generate.</div> :
                    <table><thead><tr><th>Report</th><th>Type</th><th>Period</th><th>Generated</th><th>Actions</th></tr></thead><tbody>{generatedReports.map((r, i) => (
                        <tr key={i}><td style={{fontWeight:500}}>{r.title}</td><td><span className="badge badge-info">{reportLabels[r.type]}</span></td><td style={{fontSize:12}}>{r.period}</td><td>{r.generated}</td><td><div style={{display:'flex',gap:6}}>
                            <button className="btn btn-secondary" style={{padding:'4px 8px'}} onClick={() => setViewingReport(r)} title="View"><Icons.Eye /></button>
                            <button className="btn btn-secondary" style={{padding:'4px 8px'}} onClick={() => downloadCSV(r)} title="Download CSV"><Icons.Download /></button>
                            <button className="btn btn-secondary" style={{padding:'4px 8px'}} onClick={() => printReport(r)} title="Print"><Icons.Print /></button>
                        </div></td></tr>))}</tbody></table>}
                    </div>
                </div>
            </div></div>);
        };

        const AIPage = () => {
            const [msgs, setMsgs] = useState([{ role: 'bot', content: `Welcome to ${COMPANY.name} AI Assistant! I'm powered by AI and can have real conversations about your fleet operations. Ask me about route optimization, IFTA calculations, HOS compliance, load matching, driver management, maintenance schedules, or anything else related to your trucking business.` }]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const chatRef = useRef(null);
            useEffect(() => { if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight; }, [msgs]);
            const send = async () => {
                if (!input.trim() || loading) return;
                const userMsg = input.trim();
                setInput('');
                const updated = [...msgs, { role: 'user', content: userMsg }];
                setMsgs(updated);
                setLoading(true);
                try {
                    const res = await fetch('ai-chat.php', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: userMsg, history: updated.slice(-10) })
                    });
                    const data = await res.json();
                    setMsgs(prev => [...prev, { role: 'bot', content: data.reply || 'Sorry, I could not process that request. Please try again.' }]);
                } catch (err) {
                    setMsgs(prev => [...prev, { role: 'bot', content: 'Connection error. Please check your internet and try again.' }]);
                }
                setLoading(false);
            };
            return (<div className="page" style={{padding:0}}><div className="card" style={{height:'calc(100vh - 100px)',display:'flex',flexDirection:'column'}}><div className="card-header"><div style={{display:'flex',alignItems:'center',gap:10}}><div style={{width:36,height:36,borderRadius:'50%',background:'linear-gradient(135deg,#1a365d,#2c5282)',display:'flex',alignItems:'center',justifyContent:'center',color:'white'}}><Icons.AI /></div><div><h3 style={{margin:0,fontSize:14}}>Fleet AI Assistant</h3><span style={{fontSize:11,color:'#718096'}}>Powered by Llama 3.1 AI</span></div></div><span className="live"><span className="live-dot"></span>Online</span></div><div style={{display:'flex',gap:6,padding:'10px 14px',borderBottom:'1px solid #e2e8f0',flexWrap:'wrap'}}>{['Optimize active routes','Check HOS compliance','Calculate IFTA','Find available drivers','Fuel cost analysis','Maintenance schedule','DOT compliance check','Load profitability'].map((a,i) => <button key={i} className="btn btn-secondary" style={{fontSize:11,padding:'5px 10px'}} onClick={() => { setInput(a); }}>{a}</button>)}</div><div ref={chatRef} style={{flex:1,overflowY:'auto',padding:14}}>{msgs.map((m, i) => (<div key={i} style={{display:'flex',gap:10,marginBottom:14,flexDirection:m.role==='user'?'row-reverse':'row'}}><div style={{width:32,height:32,borderRadius:'50%',background:m.role==='bot'?'linear-gradient(135deg,#1a365d,#2c5282)':'#e2e8f0',display:'flex',alignItems:'center',justifyContent:'center',color:m.role==='bot'?'white':'#4a5568',fontSize:11,flexShrink:0}}>{m.role==='bot'?<Icons.AI />:'You'}</div><div style={{maxWidth:'70%',padding:'10px 14px',borderRadius:12,background:m.role==='bot'?'#edf2f7':'#1a365d',color:m.role==='bot'?'#2d3748':'white',fontSize:13,lineHeight:1.5,whiteSpace:'pre-wrap'}}>{m.content}</div></div>))}{loading && <div style={{display:'flex',gap:10,marginBottom:14}}><div style={{width:32,height:32,borderRadius:'50%',background:'linear-gradient(135deg,#1a365d,#2c5282)',display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontSize:11,flexShrink:0}}><Icons.AI /></div><div style={{padding:'10px 14px',borderRadius:12,background:'#edf2f7',color:'#718096',fontSize:13}}>Thinking...</div></div>}</div><div style={{padding:14,borderTop:'1px solid #e2e8f0',display:'flex',gap:10}}><input className="form-input" style={{flex:1}} placeholder="Ask about routes, drivers, IFTA, compliance..." value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key==='Enter' && send()} disabled={loading} /><button className="btn btn-primary" onClick={send} disabled={loading}><Icons.Send /> {loading ? '...' : 'Send'}</button></div></div></div>);
        };

        const SettingsPage = ({ fleet }) => {
            const { saving, saveCompanySettings } = fleet;
            const toast = useToast();
            const [tab, setTab] = useState('company');
            const [companyName, setCompanyName] = useState(COMPANY.fullName);
            const [dotNum, setDotNum] = useState('3847291');
            const [mcNum, setMcNum] = useState('MC-0000000');
            // Integrations state
            const [integrations, setIntegrations] = useState([
                {id:'samsara',n:'Samsara ELD',desc:'Electronic logging device integration for HOS tracking',s:'connected',apiKey:'****-****-samsara-key',webhook:'https://hooks.dlwestate.com/samsara'},
                {id:'dat',n:'DAT Load Board',desc:'Access freight marketplace for load matching',s:'connected',apiKey:'****-****-dat-key',webhook:''},
                {id:'quickbooks',n:'QuickBooks Online',desc:'Sync invoices and financial data automatically',s:'disconnected',apiKey:'',webhook:''},
                {id:'promiles',n:'ProMiles',desc:'Mileage calculation and route optimization',s:'connected',apiKey:'****-****-promiles',webhook:''},
                {id:'stripe',n:'Stripe Payments',desc:'Accept online payments and manage billing',s:'disconnected',apiKey:'',webhook:''},
            ]);
            const [configuring, setConfiguring] = useState(null);
            const [cfgKey, setCfgKey] = useState('');
            const [cfgWebhook, setCfgWebhook] = useState('');
            const toggleIntegration = (id) => {
                setIntegrations(prev => prev.map(i => i.id === id ? { ...i, s: i.s === 'connected' ? 'disconnected' : 'connected', apiKey: i.s === 'connected' ? '' : i.apiKey } : i));
                const int = integrations.find(i => i.id === id);
                toast(int.s === 'connected' ? `${int.n} disconnected` : `${int.n} connected`, 'success');
            };
            const openConfig = (int) => { setConfiguring(int.id); setCfgKey(int.apiKey); setCfgWebhook(int.webhook || ''); };
            const saveConfig = (id) => {
                setIntegrations(prev => prev.map(i => i.id === id ? { ...i, apiKey: cfgKey, webhook: cfgWebhook } : i));
                setConfiguring(null); toast('Integration settings saved', 'success');
            };
            // Compliance state
            const [complianceItems, setComplianceItems] = useState([
                { id:'c1', doc: 'DOT Authority', status: 'valid', expiry: '2027-03-15', lastUpdated: '2024-03-15', notes: '' },
                { id:'c2', doc: 'MC Authority', status: 'valid', expiry: '2027-03-15', lastUpdated: '2024-03-15', notes: '' },
                { id:'c3', doc: 'BOC-3 Filing', status: 'valid', expiry: 'N/A', lastUpdated: '2024-01-10', notes: '' },
                { id:'c4', doc: 'UCR Registration', status: 'valid', expiry: '2026-12-31', lastUpdated: '2025-12-01', notes: '' },
                { id:'c5', doc: 'IFTA License', status: 'valid', expiry: '2026-12-31', lastUpdated: '2025-11-15', notes: '' },
                { id:'c6', doc: 'IRP Registration', status: 'warning', expiry: '2026-02-28', lastUpdated: '2025-02-28', notes: '' },
                { id:'c7', doc: 'General Liability Insurance', status: 'valid', expiry: '2026-06-30', lastUpdated: '2025-06-30', notes: '' },
                { id:'c8', doc: 'Cargo Insurance', status: 'valid', expiry: '2026-06-30', lastUpdated: '2025-06-30', notes: '' },
                { id:'c9', doc: 'Drug & Alcohol Policy', status: 'valid', expiry: 'N/A', lastUpdated: '2024-08-01', notes: '' },
                { id:'c10', doc: 'Safety Management Plan', status: 'valid', expiry: 'N/A', lastUpdated: '2025-01-15', notes: '' },
            ]);
            const [editingCompliance, setEditingCompliance] = useState(null);
            const [compEditExpiry, setCompEditExpiry] = useState('');
            const [compEditStatus, setCompEditStatus] = useState('');
            const [compEditNotes, setCompEditNotes] = useState('');
            const [showAddCompliance, setShowAddCompliance] = useState(false);
            const [newCompDoc, setNewCompDoc] = useState('');
            const [newCompExpiry, setNewCompExpiry] = useState('');
            const [viewingCompliance, setViewingCompliance] = useState(null);
            const startCompEdit = (item) => { setEditingCompliance(item.id); setCompEditExpiry(item.expiry === 'N/A' ? '' : item.expiry); setCompEditStatus(item.status); setCompEditNotes(item.notes || ''); };
            const saveCompEdit = (id) => {
                const today = new Date().toISOString().split('T')[0];
                setComplianceItems(prev => prev.map(c => c.id === id ? { ...c, expiry: compEditExpiry || c.expiry, status: compEditStatus, notes: compEditNotes, lastUpdated: today } : c));
                setEditingCompliance(null); toast('Compliance record updated', 'success');
            };
            const addCompliance = () => {
                if (!newCompDoc.trim()) { toast('Document name required', 'error'); return; }
                const today = new Date().toISOString().split('T')[0];
                setComplianceItems(prev => [...prev, { id: `c${Date.now()}`, doc: newCompDoc, status: 'valid', expiry: newCompExpiry || 'N/A', lastUpdated: today, notes: '' }]);
                setShowAddCompliance(false); setNewCompDoc(''); setNewCompExpiry(''); toast('Compliance document added', 'success');
            };
            const deleteCompliance = (id) => { if (!confirm('Remove this compliance record?')) return; setComplianceItems(prev => prev.filter(c => c.id !== id)); toast('Compliance record removed', 'success'); };
            // Users state
            const [users, setUsers] = useState([
                { id: 'USR-001', name: 'David Williams', email: 'david@dlwestate.com', role: 'Owner', status: 'active', lastLogin: '2026-01-31 08:45 AM' },
                { id: 'USR-002', name: 'Maria Santos', email: 'maria@dlwestate.com', role: 'Dispatcher', status: 'active', lastLogin: '2026-01-31 07:30 AM' },
                { id: 'USR-003', name: 'John Thompson', email: 'john@dlwestate.com', role: 'Accountant', status: 'active', lastLogin: '2026-01-30 04:15 PM' },
                { id: 'USR-004', name: 'Lisa Chen', email: 'lisa@dlwestate.com', role: 'Safety Manager', status: 'active', lastLogin: '2026-01-29 11:20 AM' },
                { id: 'USR-005', name: 'Mike Johnson', email: 'mike@dlwestate.com', role: 'Driver Manager', status: 'inactive', lastLogin: '2026-01-15 09:00 AM' },
            ]);
            const [editingUser, setEditingUser] = useState(null);
            const [showAddUser, setShowAddUser] = useState(false);
            const [userForm, setUserForm] = useState({ name: '', email: '', role: 'Dispatcher', status: 'active' });
            const startUserEdit = (user) => { setEditingUser(user.id); setUserForm({ name: user.name, email: user.email, role: user.role, status: user.status }); };
            const saveUserEdit = (id) => {
                setUsers(prev => prev.map(u => u.id === id ? { ...u, ...userForm } : u));
                setEditingUser(null); toast('User updated', 'success');
            };
            const addUser = async () => {
                if (!userForm.name.trim() || !userForm.email.trim()) { toast('Name and email required', 'error'); return; }
                setUsers(prev => [...prev, { ...userForm, id: `USR-${Date.now().toString().slice(-3)}`, lastLogin: 'Never' }]);
                // Send invitation email
                try {
                    await fetch('invite-user.php', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: userForm.name, email: userForm.email, role: userForm.role }) });
                } catch(e) {}
                setShowAddUser(false); setUserForm({ name: '', email: '', role: 'Dispatcher', status: 'active' }); toast(`User added. Invitation email sent to ${userForm.email}`, 'success');
            };
            const deleteUser = (id) => { if (!confirm('Remove this user?')) return; setUsers(prev => prev.filter(u => u.id !== id)); toast('User removed', 'success'); };
            const resetPassword = (user) => { toast(`Password reset email sent to ${user.email}`, 'success'); };
            const toggleUserStatus = (id) => { setUsers(prev => prev.map(u => u.id === id ? { ...u, status: u.status === 'active' ? 'inactive' : 'active' } : u)); };
            const upcomingRenewals = complianceItems.filter(c => c.expiry !== 'N/A' && c.status === 'warning');
            return (<div className="page"><div className="card"><div className="tabs">{['Company','Integrations','Compliance','Users'].map(t => <div key={t} className={`tab ${tab===t.toLowerCase()?'active':''}`} onClick={() => setTab(t.toLowerCase())}>{t}</div>)}</div><div className="card-body">
            {tab === 'company' && <div style={{maxWidth:500}}><div className="form-group"><label className="form-label">Company Name</label><input className="form-input" value={companyName} onChange={e => setCompanyName(e.target.value)} /></div><div className="form-row"><div className="form-group"><label className="form-label">DOT Number</label><input className="form-input" value={dotNum} onChange={e => setDotNum(e.target.value)} /></div><div className="form-group"><label className="form-label">MC Number</label><input className="form-input" value={mcNum} onChange={e => setMcNum(e.target.value)} /></div></div><div className="form-group"><label className="form-label">Entity ID</label><input className="form-input" defaultValue={COMPANY.entityId} readOnly style={{background:'#edf2f7'}} /></div><button className="btn btn-primary" style={{marginTop:10}} disabled={saving} onClick={() => saveCompanySettings({ name: companyName, dot_number: dotNum, mc_number: mcNum })}>{saving ? 'Saving...' : 'Save Changes'}</button></div>}
            {tab === 'integrations' && <div>{integrations.map(int => (<div key={int.id} style={{padding:'16px 0',borderBottom:'1px solid #e2e8f0'}}>

                    <div><div style={{fontWeight:600,fontSize:14}}>{int.n}</div><div style={{fontSize:12,color:'#718096',marginTop:2}}>{int.desc}</div></div>

                    </div>

            </div>))}</div>}
            {tab === 'compliance' && <div>

lassName="info-label">Gross Weight</div><div className="info-value">{(truck.grossWeight||0).toLocaleString()} lbs</div></div><div className="info-item"><div className="info-label">Assigned Driver</div><div className="info-value">{d?.name || 'Unassigned'}</div></div><div className="info-item"><div className="info-label">ELD Provider</div><div className="info-value">{truck.eldProvider}</div></div><div className="info-item"><div className="info-label">ELD Serial</div><div className="info-value">{truck.eldSerial}</div></div><div className="info-item"><div className="info-label">Insurance Policy</div><div className="info-value">{truck.insurancePolicy}</div></div><div className="info-item"><div className="info-label">Insurance Expiry</div><div className="info-value">{truck.insuranceExpiry}</div></div><div className="info-item"><div className="info-label">Annual Inspection</div><div className="info-value">{truck.annualInspection}</div></div><div className="info-item"><div className="info-label">Registration Exp</div><div className="info-value">{truck.registrationExpiry}</div></div><div className="info-item"><div className="info-label">Fuel Card</div><div className="info-value">{truck.fuelCardNum}</div></div><div className="info-item"><div className="info-label">Purchase Date</div><div className="info-value">{truck.purchaseDate}</div></div><div className="info-item"><div className="info-label">Purchase Price</div><div className="info-value">${(truck.purchasePrice||0).toLocaleString()}</div></div><div className="info-item"><div className="info-label">Current Value</div><div className="info-value">${(truck.currentValue||0).toLocaleString()}</div></div></div><div className="info-item" style={{marginTop:12}}><div className="info-label">Notes</div><div className="info-value">{truck.notes}</div></div></div><div className="modal-footer"><button className="btn btn-secondary" onClick={onClose}>Close</button><button className="btn btn-primary"><Icons.Edit /> Edit Truck</button></div>                 <div className="form-row-3"><div className="form-group"><label className="form-label">Miles</label><input type="number" className="form-input" value={form.miles} onChange={e => set('miles', parseInt(e.target.value)||0)} /></div><div className="form-group"><label className="form-label">Weight (lbs)</label><input type="number" className="form-input" value={form.weight} onChange={e => set('weight', parseInt(e.target.value)||0)} /></div><div className="form-group"><label className="form-label">Pieces</label><input type="number" className="form-input" value={form.pieces} onChange={e => set('pieces', parseInt(e.target.value)||0)} /></div></div>
                <div className="form-row"><div className="form-group"><label className="form-label">Pickup</label><input type="datetime-local" className="form-input" value={form.pickup} onChange={e => set('pickup', e.target.value)} /></div><div className="form-group"><label className="form-label">Delivery</label><input type="datetime-local" className="form-input" value={form.delivery} onChange={e => set('delivery', e.target.value)} /></div></div>
                <div className="form-row"><div className="form-group"><label className="form-label">Assign Driver</label><select className="form-select" value={form.driver||''} onChange={e => set('driver', e.target.value||null)}><option value="">Unassigned</option>{fleet.drivers.map(d => <option key={d.id} value={d.id}>{d.name} ({d.id})</option>)}</select></div><div className="form-group"><label className="form-label">Assign Truck</label><select className="form-select" value={form.truck||''} onChange={e => set('truck', e.target.value||null)}><option value="">Unassigned</option>{fleet.trucks.map(t => <option key={t.id} value={t.id}>{t.id} - {t.make} {t.model}</option>)}</select></div></div>
            </div><div className="modal-footer"><button className="btn btn-secondary" onClick={onClose}>Cancel</button><button className="btn btn-primary" disabled={fleet.saving} onClick={save}>{fleet.saving ? 'Saving...' : 'Create Load'}</button></div></div></div>);
        };

        // ============ BILL OF LADING PAGE ============
        const BillOfLadingPage = ({ fleet, setModal }) => {
            const { bols } = fleet;
            return (<div className="page"><div className="card"><div className="card-header"><h3>Bills of Lading</h3><button className="btn btn-primary" onClick={() => setModal('create-bol')}><Icons.Plus /> Create BOL</button></div>
                {bols.length === 0 ? <div className="card-body" style={{textAlign:'center',padding:40,color:'#718096'}}><Icons.BOL /><p style={{marginTop:8}}>No bills of lading yet. Create your first one.</p></div> :
                <table><thead><tr><th>BOL #</th><th>Date</th><th>Shipper</th><th>Consignee</th><th>Status</th><th>Actions</th></tr></thead><tbody>
                    {bols.map(b => (<tr key={b.dbId}><td style={{fontWeight:600}}>{b.bolNumber}</td><td>{b.bolDate}</td><td>{b.shipperCompany}</td><td>{b.consigneeCompany}</td><td><StatusBadge status={b.status} /></td><td><div style={{display:'flex',gap:6}}><button className="btn btn-secondary" style={{padding:'4px 8px'}} onClick={() => { setModal({type:'edit-bol', bol: b}); }}><Icons.Eye /></button><button className="btn btn-secondary" style={{padding:'4px 8px'}} onClick={() => { if(confirm('Delete this BOL?')) fleet.deleteBol(b.dbId); }}><Icons.Trash /></button></div></td></tr>))}
                </tbody></table>}
            </div></div>);
        };

        // ============ BOL FORM MODAL ============
        const BolFormModal = ({ onClose, fleet, editBol }) => {
            const emptyItem = { hm: false, units: '', packaging: '', description: '', spots: '', weight: '', freightClass: '', sku: '' };
            const defaultForm = { bolNumber: `BOL-${Date.now().toString().slice(-8)}`, loadNumber: '', poNumber: '', bolDate: new Date().toISOString().split('T')[0], scheduledShipDate: '', shipperInstructions: '', shipperCompany: '', shipperAddress: '', shipperCityStateZip: '', shipperPhone: '', consigneeCompany: '', consigneeAddress: '', consigneeCityStateZip: '', consigneePhone: '', items: [{ ...emptyItem }], totalUnits: 0, totalSpots: 0, totalWeight: 0, billingTerms: 'PREPAID', billToCompany: '', billToAddress: '', billToCityStateZip: '', billToPhone: '', declaredValue: '', declaredValuePer: '', shipperSignature: '', driverSignature: '', consigneeSignature: '', shipperName: '', carrierName: 'FleetCommand Pro Demo', carrierPer: '', signDate: new Date().toISOString().split('T')[0], placardsRequired: false, placardsSupplied: false, status: 'draft', notes: '' };
            const [form, setForm] = useState(editBol ? { ...defaultForm, ...editBol } : defaultForm);
            const set = (k, v) => setForm(p => ({ ...p, [k]: v }));
            const setItem = (idx, k, v) => setForm(p => { const items = [...p.items]; items[idx] = { ...items[idx], [k]: v }; const totalUnits = items.reduce((s, it) => s + (parseInt(it.units)||0), 0); const totalSpots = items.reduce((s, it) => s + (parseInt(it.spots)||0), 0); const totalWeight = items.reduce((s, it) => s + (parseInt(it.weight)||0), 0); return { ...p, items, totalUnits, totalSpots, totalWeight }; });
            const addItem = () => setForm(p => ({ ...p, items: [...p.items, { ...emptyItem }] }));
            const removeItem = (idx) => setForm(p => ({ ...p, items: p.items.filter((_, i) => i !== idx) }));
            const save = async () => { try { if (editBol && editBol.dbId) { await fleet.updateBol(editBol.dbId, form); } else { await fleet.createBol(form); } onClose(); } catch(e) {} };
            return (<div className="modal-overlay" onClick={onClose}><div className="modal modal-lg" onClick={e => e.stopPropagation()} style={{width:960}}><div className="modal-header"><h3>{editBol ? 'Edit' : 'Create'} Bill of Lading</h3><button className="close-btn" onClick={onClose}><Icons.X /></button></div><div className="modal-body">
                <div style={{textAlign:'center',marginBottom:16}}><h2 style={{fontSize:18,fontWeight:700,color:'#1a365d'}}>STRAIGHT BILL OF LADING</h2><div style={{fontSize:12,color:'#718096'}}>FleetCommand Pro Demo</div></div>
                <div className="form-row-3"><div className="form-group"><label className="form-label">BOL Number</label><input className="form-input" value={form.bolNumber} onChange={e => set('bolNumber', e.target.value)} /></div><div className="form-group"><label className="form-label">Load #</label><input className="form-input" value={form.loadNumber} onChange={e => set('loadNumber', e.target.value)} /></div><div className="form-group"><label className="form-label">PO #</label><input className="form-input" value={form.poNumber} onChange={e => set('poNumber', e.target.value)} /></div></div>
                <div className="form-row"><div className="form-group"><label className="form-label">BOL Date</label><input type="date" className="form-input" value={form.bolDate} onChange={e => set('bolDate', e.target.value)} /></div><div className="form-group"><label className="form-label">Scheduled Ship Date</label><input type="date" className="form-input" value={form.scheduledShipDate} onChange={e => set('scheduledShipDate', e.target.value)} /></div></div>
                <div className="form-group"><label className="form-label">Shipper Instructions</label><textarea className="form-input" rows="2" value={form.shipperInstructions} onChange={e => set('shipperInstructions', e.target.value)}></textarea></div>
                <div className="form-row">
                    <div className="bol-section"><h4>FROM (SHIPPER)</h4><div className="form-group"><label className="form-label">Company</label><input className="form-input" value={form.shipperCompany} onChange={e => set('shipperCompany', e.target.value)} /></div><div className="form-group"><label className="form-label">Address</label><input className="form-input" value={form.shipperAddress} onChange={e => set('shipperAddress', e.target.value)} /></div><div className="form-group"><label className="form-label">City/State/Zip</label><input className="form-input" value={form.shipperCityStateZip} onChange={e => set('shipperCityStateZip', e.target.value)} /></div><div className="form-group"><label className="form-label">Phone</label><input className="form-input" value={form.shipperPhone} onChange={e => set('shipperPhone', e.target.value)} /></div></div>
                    <div className="bol-section"><h4>TO (CONSIGNEE)</h4><div className="form-group"><label className="form-label">Company</label><input className="form-input" value={form.consigneeCompany} onChange={e => set('consigneeCompany', e.target.value)} /></div><div className="form-group"><label className="form-label">Address</label><input className="form-input" value={form.consigneeAddress} onChange={e => set('consigneeAddress', e.target.value)} /></div><div className="form-group"><label className="form-label">City/State/Zip</label><input className="form-input" value={form.consigneeCityStateZip} onChange={e => set('consigneeCityStateZip', e.target.value)} /></div><div className="form-group"><label className="form-label">Phone</label><input className="form-input" value={form.consigneePhone} onChange={e => set('consigneePhone', e.target.value)} /></div></div>
                </div>
                <div className="bol-section"><h4>Items</h4><table className="bol-items-table"><thead><tr><th>HM</th><th>Units</th><th>Packaging</th><th>Description</th><th>Spots</th><th>Weight</th><th>Class</th><th>SKU</th><th></th></tr></thead><tbody>
                    {form.items.map((item, idx) => (<tr key={idx}><td><input type="checkbox" checked={item.hm} onChange={e => setItem(idx, 'hm', e.target.checked)} /></td><td><input value={item.units} onChange={e => setItem(idx, 'units', e.target.value)} /></td><td><input value={item.packaging} onChange={e => setItem(idx, 'packaging', e.target.value)} /></td><td><input value={item.description} onChange={e => setItem(idx, 'description', e.target.value)} /></td><td><input value={item.spots} onChange={e => setItem(idx, 'spots', e.target.value)} /></td><td><input value={item.weight} onChange={e => setItem(idx, 'weight', e.target.value)} /></td><td><input value={item.freightClass} onChange={e => setItem(idx, 'freightClass', e.target.value)} /></td><td><input value={item.sku} onChange={e => setItem(idx, 'sku', e.target.value)} /></td><td><button className="btn btn-secondary" style={{padding:'2px 6px',fontSize:10}} onClick={() => removeItem(idx)}>X</button></td></tr>))}
                    <tr style={{background:'#f7fafc',fontWeight:600}}><td></td><td>{form.totalUnits}</td><td></td><td></td><td>{form.totalSpots}</td><td>{form.totalWeight}</td><td></td><td></td><td></td></tr>
                </tbody></table><button className="btn btn-secondary" style={{marginTop:8,fontSize:11}} onClick={addItem}><Icons.Plus /> Add Item</button></div>
                <div className="form-row">
                    <div className="form-group"><label className="form-label">Billing Terms</label><div className="radio-group"><label><input type="radio" name="terms" value="COLLECT" checked={form.billingTerms==='COLLECT'} onChange={e => set('billingTerms', e.target.value)} /> Collect</label><label><input type="radio" name="terms" value="PREPAID" checked={form.billingTerms==='PREPAID'} onChange={e => set('billingTerms', e.target.value)} /> Prepaid</label><label><input type="radio" name="terms" value="3RD PARTY" checked={form.billingTerms==='3RD PARTY'} onChange={e => set('billingTerms', e.target.value)} /> 3rd Party</label></div></div>
                    <div className="form-group"><label className="form-label">Bill To</label><input className="form-input" value={form.billToCompany} onChange={e => set('billToCompany', e.target.value)} placeholder="Company name" /></div>
                </div>
                <div className="form-row-3"><div className="form-group"><label className="form-label">Shipper Signature (Name)</label><input className="form-input" value={form.shipperName} onChange={e => set('shipperName', e.target.value)} /></div><div className="form-group"><label className="form-label">Driver Signature (Name)</label><input className="form-input" value={form.driverSignature} onChange={e => set('driverSignature', e.target.value)} /></div><div className="form-group"><label className="form-label">Carrier</label><input className="form-input" value={form.carrierName} onChange={e => set('carrierName', e.target.value)} /></div></div>
                <div className="form-row"><div className="form-group"><label style={{display:'flex',alignItems:'center',gap:6,fontSize:13,cursor:'pointer'}}><input type="checkbox" checked={form.placardsRequired} onChange={e => set('placardsRequired', e.target.checked)} /> Placards Required</label></div><div className="form-group"><label style={{display:'flex',alignItems:'center',gap:6,fontSize:13,cursor:'pointer'}}><input type="checkbox" checked={form.placardsSupplied} onChange={e => set('placardsSupplied', e.target.checked)} /> Placards Supplied</label></div></div>
                <div className="form-group"><label className="form-label">Notes</label><textarea className="form-input" rows="3" value={form.notes} onChange={e => set('notes', e.target.value)} placeholder="Where the rate of the shipment is dependent on the value of the property, the agreed or declared value must be stated in writing by the shipper on this bill of lading."></textarea></div>
            </div><div className="modal-footer"><button className="btn btn-secondary" onClick={onClose}>Cancel</button><button className="btn btn-secondary" onClick={() => window.print()}><Icons.Print /> Print</button><button className="btn btn-primary" disabled={fleet.saving} onClick={save}><Icons.Save /> {fleet.saving ? 'Saving...' : 'Save BOL'}</button></div></div></div>);
        };

        // Main App
        const AppInner = () => {
            const fleet = useFleetData();
            const [page, setPage] = useState('dashboard');
            const [modal, setModal] = useState(null);
            const [showDemoBanner, setShowDemoBanner] = useState(!localStorage.getItem('demoBannerDismissed'));
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [searchOpen, setSearchOpen] = useState(false);
            const searchRef = React.useRef(null);

            const searchResults = React.useMemo(() => {
                if (!searchQuery || searchQuery.length < 2) return [];
                const q = searchQuery.toLowerCase();
                const results = [];
                fleet.drivers.forEach(d => {
                    const match = [d.name, d.phone, d.license, d.truck].filter(Boolean).join(' ').toLowerCase();
                    if (match.includes(q)) results.push({ type: 'Driver', label: d.name, sub: d.truck || d.phone || '', page: 'drivers' });
                });
                fleet.loads.forEach(l => {
                    const match = [l.id, l.origin, l.destination, l.customer, l.driver].filter(Boolean).join(' ').toLowerCase();
                    if (match.includes(q)) results.push({ type: 'Load', label: l.id, sub: `${l.origin || ''} > ${l.destination || ''}`, page: 'dispatch' });
                });
                fleet.trucks.forEach(t => {
                    const match = [t.id, t.unit, t.vin, t.make, t.model, t.plate].filter(Boolean).join(' ').toLowerCase();
                    if (match.includes(q)) results.push({ type: 'Truck', label: t.unit || t.id, sub: `${t.make || ''} ${t.model || ''}`.trim(), page: 'fleet' });
                });
                fleet.invoices.forEach(i => {
                    const match = [i.id, i.customer, String(i.amount)].filter(Boolean).join(' ').toLowerCase();
                    if (match.includes(q)) results.push({ type: 'Invoice', label: i.id, sub: `${i.customer || ''} - $${(i.amount||0).toLocaleString()}`, page: 'invoicing' });
                });
                (fleet.bols || []).forEach(b => {
                    const match = [b.bolNumber, b.loadNumber, b.consigneeCompany, b.shipperCompany].filter(Boolean).join(' ').toLowerCase();
                    if (match.includes(q)) results.push({ type: 'BOL', label: b.bolNumber, sub: b.consigneeCompany || b.loadNumber || '', page: 'bol' });
                });
                return results.slice(0, 8);
            }, [searchQuery, fleet]);

            React.useEffect(() => {
                const handler = (e) => { if (searchRef.current && !searchRef.current.contains(e.target)) setSearchOpen(false); };
                document.addEventListener('mousedown', handler);
                return () => document.removeEventListener('mousedown', handler);
            }, []);
            const [selectedDriver, setSelectedDriver] = useState(null);
            const [selectedTruck, setSelectedTruck] = useState(null);

            const navItems = [
                { id: 'dashboard', label: 'Dashboard', icon: Icons.Dashboard },
                { id: 'dispatch', label: 'Dispatch', icon: Icons.Dispatch, badge: fleet.loads.filter(l => l.status === 'pending').length },
                { id: 'tracking', label: 'GPS Tracking', icon: Icons.Map },
                { id: 'drivers', label: 'Drivers', icon: Icons.Drivers },
                { id: 'fleet', label: 'Fleet', icon: Icons.Truck },
                { id: 'invoicing', label: 'Invoicing', icon: Icons.Invoice },
                { id: 'ifta', label: 'IFTA', icon: Icons.IFTA },
                { id: 'documents', label: 'Documents', icon: Icons.Folder },
                { id: 'bol', label: 'Bill of Lading', icon: Icons.BOL },
                { id: 'reports', label: 'Reports', icon: Icons.Reports },
                { id: 'ai', label: 'AI Assistant', icon: Icons.AI },
                { id: 'settings', label: 'Settings', icon: Icons.Settings },
            ];

            const pageConfig = { dashboard: ['Dashboard', 'Fleet overview'], dispatch: ['Dispatch Board', 'Load management'], tracking: ['GPS Tracking', 'Real-time fleet'], drivers: ['Drivers', 'Driver management'], fleet: ['Fleet', 'Truck inventory'], invoicing: ['Invoicing', 'Billing'], ifta: ['IFTA', 'Fuel tax'], documents: ['Documents', 'File management'], bol: ['Bill of Lading', 'Shipping documents'], reports: ['Reports', 'Analytics'], ai: ['AI Assistant', 'Smart logistics'], settings: ['Settings', 'Configuration'] };

            if (fleet.loading) return (<div className="app"><div style={{display:'flex',alignItems:'center',justifyContent:'center',width:'100%',height:'100vh',flexDirection:'column',gap:16}}><LoadingSpinner /><div style={{fontSize:14,color:'#718096'}}>Loading fleet data...</div></div></div>);

            const renderPage = () => {
                switch (page) {
                    case 'dashboard': return <DashboardPage setPage={setPage} fleet={fleet} />;
                    case 'dispatch': return <DispatchPage fleet={fleet} />;
                    case 'tracking': return <TrackingPage fleet={fleet} />;
                    case 'drivers': return <DriversPage setModal={setModal} setSelectedDriver={setSelectedDriver} fleet={fleet} />;
                    case 'fleet': return <FleetPage setModal={setModal} setSelectedTruck={setSelectedTruck} fleet={fleet} />;
                    case 'invoicing': return <InvoicingPage fleet={fleet} setModal={setModal} />;
                    case 'ifta': return <IFTAPage fleet={fleet} />;
                    case 'documents': return <DocumentsPage fleet={fleet} />;
                    case 'bol': return <BillOfLadingPage fleet={fleet} setModal={setModal} />;
                    case 'reports': return <ReportsPage fleet={fleet} />;
                    case 'ai': return <AIPage />;
                    case 'settings': return <SettingsPage fleet={fleet} />;
                    default: return <DashboardPage setPage={setPage} fleet={fleet} />;
                }
            };

            return (
                <div className="app">
                    <button className="sidebar-toggle" onClick={() => setSidebarOpen(!sidebarOpen)}>&#9776;</button>
                    <div className={`sidebar-overlay ${sidebarOpen ? 'active' : ''}`} onClick={() => setSidebarOpen(false)} />
                    <nav className={`sidebar ${sidebarOpen ? 'open' : ''}`}>
                        <div className="logo"><img src="/fc-logo.png" alt={COMPANY.name} /><span>Transportation Management</span><div className="ids">{COMPANY.dot} | {COMPANY.mc}</div></div>
                        <div className="nav"><div className="nav-label">Operations</div>{navItems.slice(0, 5).map(n => (<div key={n.id} className={`nav-item ${page === n.id ? 'active' : ''}`} onClick={() => { setPage(n.id); setSidebarOpen(false); }}><n.icon /><span>{n.label}</span>{n.badge ? <span className="nav-badge">{n.badge}</span> : null}</div>))}<div className="nav-label">Financial</div>{navItems.slice(5, 7).map(n => (<div key={n.id} className={`nav-item ${page === n.id ? 'active' : ''}`} onClick={() => { setPage(n.id); setSidebarOpen(false); }}><n.icon /><span>{n.label}</span></div>))}<div className="nav-label">Documents</div>{navItems.slice(7, 9).map(n => (<div key={n.id} className={`nav-item ${page === n.id ? 'active' : ''}`} onClick={() => { setPage(n.id); setSidebarOpen(false); }}><n.icon /><span>{n.label}</span></div>))}<div className="nav-label">Tools</div>{navItems.slice(9).map(n => (<div key={n.id} className={`nav-item ${page === n.id ? 'active' : ''}`} onClick={() => { setPage(n.id); setSidebarOpen(false); }}><n.icon /><span>{n.label}</span></div>))}<div style={{marginTop:'auto', paddingTop:16, borderTop:'1px solid rgba(255,255,255,0.1)'}}><a href="index.html" className="nav-item" style={{textDecoration:'none'}}><Icons.Home /><span>Back to Home</span></a></div></div>
                    </nav>
                    <main className="main">
                        <header className="header"><div className="header-left"><h2>{pageConfig[page]?.[0]}</h2><p>{pageConfig[page]?.[1]}</p></div><div className="header-right"><div className="search-wrapper" ref={searchRef}><div className="search"><Icons.Search /><input placeholder="Search loads, drivers, trucks..." value={searchQuery} onChange={e => { setSearchQuery(e.target.value); setSearchOpen(true); }} onFocus={() => setSearchOpen(true)} /></div>{searchOpen && searchResults.length > 0 && <div className="search-results">{searchResults.map((r, i) => <div key={i} className="search-result-item" onClick={() => { setPage(r.page); setSearchQuery(''); setSearchOpen(false); }}><span className="search-result-type">{r.type}</span><div className="search-result-text"><span className="search-result-label">{r.label}</span><span className="search-result-sub">{r.sub}</span></div></div>)}</div>}{searchOpen && searchQuery.length >= 2 && searchResults.length === 0 && <div className="search-results"><div className="search-no-results">No results for "{searchQuery}"</div></div>}</div><button className="btn btn-primary" onClick={() => setModal('new-load')}><Icons.Plus /> <span>New Load</span></button>{isDemo() && <a href="https://getfleetcommand.com/#pricing" className="btn btn-primary" style={{background:'linear-gradient(135deg,#c53030,#e53e3e)',border:'none',textDecoration:'none',color:'#fff',fontWeight:600}}>Upgrade Now</a>}<button className="btn btn-secondary" onClick={() => signOut()}>Sign Out</button></div></header>
                        {showDemoBanner && isDemo() && <div className="demo-banner"><p>This is a demo dashboard with sample data. Once you pay, your account will be activated with a clean slate to manage your actual fleet.</p><a href="https://getfleetcommand.com/#pricing" className="btn-payment">Make Your Payment</a><button className="btn-payment" style={{marginLeft:8,background:'#2f855a'}} onClick={async () => { if(confirm('This will clear all demo data and activate your production account. Continue?')){ markPaid(); await clearDemoData(); setShowDemoBanner(false); localStorage.setItem('demoBannerDismissed','true'); window.location.reload(); }}}> I Already Paid - Activate</button><button className="dismiss-btn" onClick={() => { setShowDemoBanner(false); localStorage.setItem('demoBannerDismissed', 'true'); }} title="Dismiss">&times;</button></div>}
                        {renderPage()}
                    </main>
                    {modal === 'driver-detail' && <DriverDetailModal driver={selectedDriver} onClose={() => { setModal(null); setSelectedDriver(null); }} />}
                    {modal === 'truck-detail' && <TruckDetailModal truck={selectedTruck} onClose={() => { setModal(null); setSelectedTruck(null); }} fleet={fleet} />}
                    {modal === 'add-driver' && <AddDriverModal onClose={() => setModal(null)} fleet={fleet} />}
                    {modal === 'new-load' && <AddLoadModal onClose={() => setModal(null)} fleet={fleet} />}
                    {modal === 'create-bol' && <BolFormModal onClose={() => setModal(null)} fleet={fleet} />}
                    {modal && modal.type === 'edit-bol' && <BolFormModal onClose={() => setModal(null)} fleet={fleet} editBol={modal.bol} />}
                </div>
            );
        };

        const App = () => {
            return React.createElement(ToastProvider, null, React.createElement(AppInner, null));
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
<div style="margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.08);font-size:12px;color:#64748b;line-height:1.6;text-align:center;max-width:700px;margin-left:auto;margin-right:auto">FleetCommand Pro software is owned and operated by <a href="https://startmybusiness.us" style="color:#94a3b8">Start My Business Inc.</a> -- <a href="https://getfleetcommand.com" style="color:#94a3b8">getfleetcommand.com</a></div>
<div style="margin:16px 0;display:flex;align-items:center;justify-content:center;gap:12px">
<img src="fleet-marker.png" alt="FleetCommand Pro" style="height:40px;width:auto">
<span style="color:#94a3b8;font-size:13px">Proudly Powered by <a href="https://getfleetcommand.com" style="color:#ff9800;font-weight:600">FleetCommand Pro</a> Software</span>
</div>
</body>
</html>
