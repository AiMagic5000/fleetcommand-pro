    <script>

            Edit: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
            Phone: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72"/></svg>,
            BOL: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="15" y2="16"/></svg>,
            Trash: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
            Print: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>,
            Save: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>,
            Home: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
        };

        const StatusBadge = ({ status }) => {
            const cfg = { driving: ['badge-success', 'Driving'], on_duty: ['badge-info', 'On Duty'], off_duty: ['badge-gray', 'Off Duty'], sleeper: ['badge-warning', 'Sleeper'], in_transit: ['badge-warning', 'In Transit'], pending: ['badge-gray', 'Pending'], delivered: ['badge-success', 'Delivered'], active: ['badge-success', 'Active'], maintenance: ['badge-danger', 'Maintenance'], paid: ['badge-success', 'Paid'], overdue: ['badge-danger', 'Overdue'], draft: ['badge-gray', 'Draft'], signed: ['badge-success', 'Signed'], voided: ['badge-danger', 'Voided'] }[status] || ['badge-gray', status];
            return <span className={`badge ${cfg[0]}`}>{cfg[1]}</span>;
        };

        const LoadingSpinner = () => <div className="spinner"></div>;

        // PAGES - All wired to live Supabase data

        const DashboardPage = ({ setPage, fleet }) => {
            const { drivers, trucks, loads } = fleet;
            const chartRef = useRef(null);
            useEffect(() => {
                if (chartRef.current) {
                    const c = new Chart(chartRef.current, { type: 'line', data: { labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'], datasets: [{ label: 'Revenue', data: [4200, 5100, 3800, 6200, 5400, 2800, 4800], borderColor: '#1a365d', backgroundColor: 'rgba(26,54,93,0.1)', fill: true, tension: 0.4 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { ticks: { callback: v => '$' + v/1000 + 'K' } } } } });
                    return () => c.destroy();
                }
            }, []);
            const activeLoads = loads.filter(l => l.status === 'in_transit').length;
            const revenue = loads.reduce((s, l) => s + (l.totalRate || 0), 0);
            return (
                <div className="page">
                    <div className="stats">
                        <div className="stat hl"><div className="stat-val">${(revenue/1000).toFixed(1)}K</div><div className="stat-label">Total Revenue</div></div>
                        <div className="stat"><div className="stat-val">{activeLoads}</div><div className="stat-label">Active Loads</div></div>
                        <div className="stat"><div className="stat-val">{trucks.filter(t => t.status === 'active').length}/{trucks.length}</div><div className="stat-label">Active Trucks</div></div>
                        <div className="stat"><div className="stat-val">{drivers.filter(d => d.status === 'driving').length}</div><div className="stat-label">Drivers On Road</div></div>
                        <div className="stat"><div className="stat-val">{loads.filter(l => l.status === 'pending').length}</div><div className="stat-label">Pending Dispatch</div></div>
                    </div>
                    <div className="grid-2-1">
                        <div className="card"><div className="card-header"><h3>Weekly Revenue</h3></div><div className="card-body" style={{height:260}}><canvas ref={chartRef}></canvas></div></div>
                        <div className="card"><div className="card-header"><h3>Alerts</h3><span className="badge badge-danger">3</span></div><div className="card-body" style={{padding:12}}>
                            {drivers.filter(d => d.hosRemaining < 5 && d.status === 'driving').map(d => <div key={d.id} className="alert alert-danger"><div style={{color:'#c53030'}}><Icons.Alert /></div><div><h4>HOS Warning - {d.name}</h4><p>{d.hosRemaining} hours remaining, approaching limit</p></div></div>)}
                            {trucks.filter(t => t.status === 'maintenance').map(t => <div key={t.id} className="alert alert-warning"><div style={{color:'#c05621'}}><Icons.Truck /></div><div><h4>{t.id} In Maintenance</h4><p>{t.notes || 'Repair in progress'}</p></div></div>)}
                            {fleet.invoices.filter(i => i.status === 'overdue').map(i => <div key={i.id} className="alert alert-info"><div style={{color:'#2b6cb0'}}><Icons.Invoice /></div><div><h4>Invoice Overdue - {i.id}</h4><p>{i.customer} - ${(i.amount||0).toLocaleString()} past due</p></div></div>)}
                        </div></div>
                    </div>
                    <div className="grid-2">
                        <div className="card"><div className="card-header"><h3>Active Loads</h3><button className="btn btn-secondary" onClick={() => setPage('dispatch')}>View All</button></div>
                            <table><thead><tr><th>Load</th><th>Route</th><th>Driver</th><th>Progress</th><th>Rate</th></tr></thead><tbody>
                                {loads.filter(l => l.status === 'in_transit').map(l => { const d = drivers.find(x => x.id === l.driver); return (
                                    <tr key={l.id}><td style={{fontWeight:600}}>{l.id}</td><td><div style={{fontSize:12}}>{(l.origin||'').split(',')[0]} &rarr; {(l.destination||'').split(',')[0]}</div></td><td>{d?.name}</td><td><div style={{display:'flex',alignItems:'center',gap:6}}><div className="progress" style={{width:50}}><div className="progress-fill" style={{width:`${l.progress}%`,background:'#2b6cb0'}}></div></div><span style={{fontSize:11}}>{l.progress}%</span></div></td><td style={{fontWeight:600,color:'#2f855a'}}>${(l.totalRate||0).toLocaleString()}</td></tr>
                                ); })}
                            </tbody></table>
                        </div>
                        <div className="card"><div className="card-header"><h3>Driver Status</h3><button className="btn btn-secondary" onClick={() => setPage('drivers')}>View All</button></div>
                            <table><thead><tr><th>Driver</th><th>Status</th><th>HOS</th><th>Load</th></tr></thead><tbody>
                                {drivers.map(d => (<tr key={d.id}><td><div className="driver-card"><div className="avatar"><img src={d.photo} alt="" /></div><div className="driver-info"><div className="name">{d.name}</div><div className="meta">{d.truck}</div></div></div></td><td><StatusBadge status={d.status} /></td><td style={{fontWeight:500,color:d.hosRemaining<5?'#c53030':'inherit'}}>{d.hosRemaining}h</td><td>{d.currentLoad || '-'}</td></tr>))}
                            </tbody></table>
                        </div>
                    </div>
                </div>
            );
        };

        const DispatchPage = ({ fleet }) => {
            const { drivers, loads } = fleet;
            const cols = [{ k: 'pending', l: 'Pending', lds: loads.filter(x => x.status === 'pending') }, { k: 'assigned', l: 'Assigned', lds: [] }, { k: 'transit', l: 'In Transit', lds: loads.filter(x => x.status === 'in_transit') }, { k: 'delivered', l: 'Delivered', lds: loads.filter(x => x.status === 'delivered') }];
            return (<div className="page"><div className="dispatch-board">{cols.map(c => (<div key={c.k} className="dispatch-col"><div className={`dispatch-col-header ${c.k}`}><h4>{c.l}</h4><span className="count">{c.lds.length}</span></div>{c.lds.map(l => { const d = drivers.find(x => x.id === l.driver); return (<div key={l.id} className="load-card"><div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}><span style={{fontWeight:600,fontSize:12}}>{l.id}</span><span style={{fontWeight:700,color:'#2f855a',fontSize:13}}>${(l.totalRate||0).toLocaleString()}</span></div><span className="badge badge-gray" style={{marginBottom:6}}>{l.type} - {(l.equipment||'').split(' ')[0]}</span><div style={{display:'flex',alignItems:'center',gap:6,margin:'8px 0',fontSize:12,color:'#4a5568'}}><span>{(l.origin||'').split(',')[0]}</span><span style={{display:'inline-flex',width:10,height:10}}><Icons.ArrowRight /></span><span>{(l.destination||'').split(',')[0]}</span></div><div style={{fontSize:12,color:'#718096'}}>{l.customer}</div>{d && <div className="driver-card" style={{marginTop:8,paddingTop:8,borderTop:'1px solid #e2e8f0'}}><div className="avatar" style={{width:24,height:24,fontSize:10}}><img src={d.photo} alt="" /></div><div style={{fontSize:11}}>{d.name}</div></div>}{l.progress > 0 && l.progress < 100 && <div style={{marginTop:8}}><div style={{display:'flex',justifyContent:'space-between',fontSize:10,marginBottom:2}}><span>Progress</span><span>{l.progress}%</span></div><div className="progress"><div className="progress-fill" style={{width:`${l.progress}%`,background:'#2b6cb0'}}></div></div></div>}</div>); })}</div>))}</div></div>);
        };

        const TrackingPage = ({ fleet }) => {
            const { drivers, trucks, loads } = fleet;
            const toast = useToast();
            const mapRef = useRef(null);
            const mapInstance = useRef(null);
            useEffect(() => {
                if (mapRef.current && drivers.length > 0) {
                    if (mapInstance.current) { mapInstance.current.remove(); mapInstance.current = null; }
                    mapInstance.current = L.map(mapRef.current).setView([36, -105], 4);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapInstance.current);
                    drivers.forEach(d => {
                        if (!d.lat || !d.lng) return;
                        const active = d.status === 'driving';
                        const icon = L.divIcon({ className: '', html: `<div style="width:30px;height:30px;background:${active ? '#2f855a' : '#718096'};border-radius:50%;border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;font-size:10px">${(d.name||'').split(' ').map(n => n[0]).join('')}</div>`, iconSize: [30, 30] });
                        L.marker([d.lat, d.lng], { icon }).bindPopup(`<b>${d.name}</b><br>${d.city}<br>HOS: ${d.hosRemaining}h`).addTo(mapInstance.current);
                    });
                    // Also plot connected trackers
                    trackers.filter(t => t.status === 'online' && t.lat && t.lng).forEach(t => {
                        const icon = L.divIcon({ className: '', html: `<div style="width:24px;height:24px;background:#2b6cb0;border-radius:4px;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;font-size:8px">GPS</div>`, iconSize: [24, 24] });
                        L.marker([t.lat, t.lng], { icon }).bindPopup(`<b>${t.name}</b><br>${t.trackerType}<br>IMEI: ${t.imei}<br>Assigned: ${t.assignedTo}`).addTo(mapInstance.current);
                    });
                }
                return () => { if (mapInstance.current) { mapInstance.current.remove(); mapInstance.current = null; } };
            }, [drivers]);

            // GPS Tracker state
            const [trackers, setTrackers] = useState([
                { id: 'GPS-001', name: 'Tracker Unit A', imei: '356938035643809', trackerType: 'OBD-II', protocol: 'TCP/IP', assignType: 'truck', assignedTo: 'TRK-101', updateInterval: 30, status: 'online', lastPing: '2 min ago', lat: 34.05, lng: -118.24, battery: 95, signal: 'Strong' },
                { id: 'GPS-002', name: 'Tracker Unit B', imei: '356938035643810', trackerType: 'Hardwired', protocol: 'TCP/IP', assignType: 'truck', assignedTo: 'TRK-103', updateInterval: 60, status: 'online', lastPing: '5 min ago', lat: 36.17, lng: -115.14, battery: null, signal: 'Strong' },
                { id: 'GPS-003', name: 'Magnetic Portable', imei: '356938035643811', trackerType: 'Magnetic/Portable', protocol: 'HTTP API', assignType: 'container', assignedTo: 'CTR-440', updateInterval: 120, status: 'offline', lastPing: '3 hours ago', lat: null, lng: null, battery: 22, signal: 'Weak' },
            ]);
            const [showAddTracker, setShowAddTracker] = useState(false);
            const [editingTracker, setEditingTracker] = useState(null);
            const [trackerForm, setTrackerForm] = useState({ name: '', imei: '', trackerType: 'OBD-II', protocol: 'TCP/IP', assignType: 'truck', assignedTo: '', updateInterval: 30 });
            const setTF = (k, v) => setTrackerForm(p => ({ ...p, [k]: v }));

            const trackerTypes = [
                { value: 'OBD-II', label: 'OBD-II Plug-In', desc: 'Plugs into the OBD-II diagnostic port. Draws power from the vehicle. Best for trucks.' },
                { value: 'Hardwired', label: 'Hardwired GPS', desc: 'Wired directly into vehicle power. Tamper-proof, always on. Best for permanent installs.' },
                { value: 'Magnetic/Portable', label: 'Magnetic / Portable', desc: 'Battery-powered with magnetic mount. Move between assets. Best for containers and trailers.' },
                { value: 'Satellite', label: 'Satellite Tracker', desc: 'Works anywhere via satellite. No cellular coverage needed. Best for remote routes.' },
                { value: 'Dashcam+GPS', label: 'Dashcam + GPS Combo', desc: 'Dual-facing camera with built-in GPS. Tracks location and records video.' },
            ];
            const protocols = ['TCP/IP', 'HTTP API', 'MQTT', 'Satellite (Iridium)', 'Sigfox/LoRa'];
            const assignOptions = () => {
                if (trackerForm.assignType === 'truck') return trucks.map(t => ({ v: t.id, l: `${t.id} - ${t.make} ${t.model}` }));
                if (trackerForm.assignType === 'load') return loads.map(l => ({ v: l.id, l: `${l.id} - ${l.origin} to ${l.destination}` }));
                return [{ v: '', l: 'Enter container ID manually' }];
            };

            const addTracker = () => {
                if (!trackerForm.name.trim() || !trackerForm.imei.trim()) { toast('Tracker name and IMEI/Serial are required', 'error'); return; }
                if (!trackerForm.assignedTo.trim()) { toast('Please assign this tracker to an asset', 'error'); return; }
                const newTracker = { ...trackerForm, id: `GPS-${Date.now().toString().slice(-4)}`, status: 'pending', lastPing: 'Never', lat: null, lng: null, battery: null, signal: 'Unknown' };
                setTrackers(prev => [...prev, newTracker]);
                setShowAddTracker(false);
                setTrackerForm({ name: '', imei: '', trackerType: 'OBD-II', protocol: 'TCP/IP', assignType: 'truck', assignedTo: '', updateInterval: 30 });
                toast('GPS tracker added. Waiting for first ping...', 'success');
            };

            const startEditTracker = (t) => {
                setEditingTracker(t.id);
                setTrackerForm({ name: t.name, imei: t.imei, trackerType: t.trackerType, protocol: t.protocol, assignType: t.assignType, assignedTo: t.assignedTo, updateInterval: t.updateInterval });
            };
            const saveEditTracker = (id) => {
                setTrackers(prev => prev.map(t => t.id === id ? { ...t, ...trackerForm } : t));
                setEditingTracker(null);
                toast('Tracker updated', 'success');
            };
            const deleteTracker = (id) => { if (!confirm('Disconnect and remove this GPS tracker?')) return; setTrackers(prev => prev.filter(t => t.id !== id)); toast('Tracker removed', 'success'); };
            const pingTracker = (id) => { toast('Ping sent to tracker. Waiting for response...', 'success'); setTimeout(() => { setTrackers(prev => prev.map(t => t.id === id ? { ...t, lastPing: 'Just now', status: 'online' } : t)); toast('Tracker responded', 'success'); }, 2000); };

            const statusColor = (s) => s === 'online' ? '#2f855a' : s === 'pending' ? '#c05621' : '#c53030';

            return (<div className="page">
                <div className="grid-2" style={{gridTemplateColumns:'1fr 2fr'}}>
                    <div className="card"><div className="card-header"><h3>Active Trucks</h3><span className="live"><span className="live-dot"></span>Live</span></div><div style={{maxHeight:400,overflowY:'auto'}}>{drivers.map(d => (<div key={d.id} style={{padding:'12px 14px',borderBottom:'1px solid #edf2f7'}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}><div className="driver-card"><div className="avatar" style={{width:32,height:32}}><img src={d.photo} alt="" /></div><div className="driver-info"><div className="name" style={{fontSize:12}}>{d.name}</div><div className="meta">{d.truck}</div></div></div><StatusBadge status={d.status} /></div><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,fontSize:11}}><div><span style={{color:'#718096'}}>Location:</span> {d.city}</div><div><span style={{color:'#718096'}}>HOS:</span> <span style={{color:d.hosRemaining<5?'#c53030':'inherit',fontWeight:500}}>{d.hosRemaining}h</span></div></div></div>))}</div></div>
                    <div className="card"><div className="card-header"><h3>Fleet Map</h3></div><div className="map-container"><div id="map" ref={mapRef}></div></div></div>
                </div>

                {/* GPS Tracker Management */}
                <div className="card" style={{marginTop:20}}>
                    <div className="card-header">
                        <div><h3 style={{display:'flex',alignItems:'center',gap:8}}>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{width:20,height:20}}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/></svg>
                            Connect Your GPS Tracker
                        </h3><p style={{fontSize:12,color:'#718096',margin:'4px 0 0'}}>Add and manage GPS tracking devices for your trucks, trailers, and containers</p></div>
                        <button className="btn btn-primary" onClick={() => { setShowAddTracker(!showAddTracker); setEditingTracker(null); setTrackerForm({ name: '', imei: '', trackerType: 'OBD-II', protocol: 'TCP/IP', assignType: 'truck', assignedTo: '', updateInterval: 30 }); }}><Icons.Plus /> Add Tracker</button>
                    </div>

                    {showAddTracker && <div style={{padding:'20px',background:'#f7fafc',borderBottom:'1px solid #e2e8f0'}}>
                        <h4 style={{fontSize:14,fontWeight:600,marginBottom:16,color:'#1a365d'}}>New GPS Tracker Setup</h4>

                        {/* Step 1: Tracker Type */}
                        <div style={{marginBottom:20}}>
                            <label className="form-label" style={{fontSize:13,fontWeight:600,marginBottom:10,display:'block'}}>1. Select Tracker Type</label>
                            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill, minmax(180px, 1fr))',gap:10}}>
                                {trackerTypes.map(tt => (
                                    <div key={tt.value} onClick={() => setTF('trackerType', tt.value)} style={{padding:14,borderRadius:8,border: trackerForm.trackerType === tt.value ? '2px solid #1a365d' : '2px solid #e2e8f0',background: trackerForm.trackerType === tt.value ? '#ebf4ff' : 'white',cursor:'pointer',transition:'all 0.15s'}}>
                                        <div style={{fontWeight:600,fontSize:13,marginBottom:4}}>{tt.label}</div>
                                        <div style={{fontSize:11,color:'#718096',lineHeight:1.4}}>{tt.desc}</div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Step 2: Device Info */}
                        <div style={{marginBottom:20}}>
                            <label className="form-label" style={{fontSize:13,fontWeight:600,marginBottom:10,display:'block'}}>2. Device Information</label>
                            <div className="form-row" style={{gap:12}}>
                                <div className="form-group"><label className="form-label">Tracker Name</label><input className="form-input" value={trackerForm.name} onChange={e => setTF('name', e.target.value)} placeholder="e.g. Truck 101 GPS" /></div>
                                <div className="form-group"><label className="form-label">IMEI / Serial Number</label><input className="form-input" value={trackerForm.imei} onChange={e => setTF('imei', e.target.value)} placeholder="e.g. 356938035643809" /></div>
                            </div>
                            <div className="form-row" style={{gap:12}}>
                                <div className="form-group"><label className="form-label">Communication Protocol</label><select className="form-select" value={trackerForm.protocol} onChange={e => setTF('protocol', e.target.value)}>{protocols.map(p => <option key={p} value={p}>{p}</option>)}</select></div>
                                <div className="form-group"><label className="form-label">Update Interval (seconds)</label><select className="form-select" value={trackerForm.updateInterval} onChange={e => setTF('updateInterval', parseInt(e.target.value))}><option value={10}>10s (Real-time)</option><option value={30}>30s (Standard)</option><option value={60}>60s (Battery saver)</option><option value={120}>2 min (Low power)</option><option value={300}>5 min (Ultra saver)</option></select></div>
                            </div>
                        </div>

                        {/* Step 3: Assign to Asset */}
                        <div style={{marginBottom:20}}>
                            <label className="form-label" style={{fontSize:13,fontWeight:600,marginBottom:10,display:'block'}}>3. Assign to Asset</label>
                            <div className="form-row" style={{gap:12}}>
                                <div className="form-group"><label className="form-label">Asset Type</label>
                                    <div style={{display:'flex',gap:8}}>
                                        {[['truck','Truck'],['load','Load'],['container','Container/Trailer']].map(([v,l]) => (
                                            <button key={v} className={`btn ${trackerForm.assignType===v?'btn-primary':'btn-secondary'}`} style={{flex:1,fontSize:12}} onClick={() => { setTF('assignType', v); setTF('assignedTo', ''); }}>{l}</button>
                                        ))}
                                    </div>
                                </div>
                                <div className="form-group"><label className="form-label">{trackerForm.assignType === 'container' ? 'Container / Trailer ID' : `Select ${trackerForm.assignType === 'truck' ? 'Truck' : 'Load'}`}</label>
                                    {trackerForm.assignType === 'container' ? <input className="form-input" value={trackerForm.assignedTo} onChange={e => setTF('assignedTo', e.target.value)} placeholder="e.g. CTR-440 or TRL-201" /> :
                                    <select className="form-select" value={trackerForm.assignedTo} onChange={e => setTF('assignedTo', e.target.value)}><option value="">-- Select --</option>{assignOptions().map(o => <option key={o.v} value={o.v}>{o.l}</option>)}</select>}
                                </div>
                            </div>
                        </div>

                        <div style={{display:'flex',gap:10,paddingTop:10,borderTop:'1px solid #e2e8f0'}}>
                            <button className="btn btn-primary" onClick={addTracker}>Connect Tracker</button>
                            <button className="btn btn-secondary" onClick={() => setShowAddTracker(false)}>Cancel</button>
                        </div>
                    </div>}

                    {/* Connected Trackers Table */}
                    <div className="card-body">
                        {trackers.length === 0 ? <div style={{textAlign:'center',padding:40,color:'#718096'}}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" style={{width:48,height:48,margin:'0 auto 12px',opacity:0.5}}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/></svg><p style={{fontSize:14,fontWeight:500}}>No GPS trackers connected</p><p style={{fontSize:12}}>Click "Add Tracker" above to connect your first GPS device.</p></div> :
                        <table><thead><tr><th>Tracker</th><th>Type</th><th>IMEI / Serial</th><th>Assigned To</th><th>Status</th><th>Last Ping</th><th>Battery</th><th>Signal</th><th>Actions</th></tr></thead><tbody>
                            {trackers.map(t => (
                                editingTracker === t.id ?
                                <tr key={t.id}>
                                    <td><input className="form-input" style={{fontSize:12,padding:'3px 6px',width:120}} value={trackerForm.name} onChange={e => setTF('name', e.target.value)} /></td>
                                    <td><select className="form-select" style={{fontSize:11,padding:'3px 4px',width:100}} value={trackerForm.trackerType} onChange={e => setTF('trackerType', e.target.value)}>{trackerTypes.map(tt => <option key={tt.value} value={tt.value}>{tt.label}</option>)}</select></td>
                                    <td><input className="form-input" style={{fontSize:12,padding:'3px 6px',width:140}} value={trackerForm.imei} onChange={e => setTF('imei', e.target.value)} /></td>
                                    <td><div style={{display:'flex',gap:4,alignItems:'center'}}><select className="form-select" style={{fontSize:11,padding:'3px 4px',width:70}} value={trackerForm.assignType} onChange={e => { setTF('assignType', e.target.value); setTF('assignedTo',''); }}><option value="truck">Truck</option><option value="load">Load</option><option value="container">Container</option></select>
                                        {trackerForm.assignType === 'container' ? <input className="form-input" style={{fontSize:11,padding:'3px 6px',width:80}} value={trackerForm.assignedTo} onChange={e => setTF('assignedTo', e.target.value)} /> : <select className="form-select" style={{fontSize:11,padding:'3px 4px',width:90}} value={trackerForm.assignedTo} onChange={e => setTF('assignedTo', e.target.value)}><option value="">--</option>{assignOptions().map(o => <option key={o.v} value={o.v}>{o.v}</option>)}</select>}
                                    </div></td>
                                    <td colSpan={3}><select className="form-select" style={{fontSize:11,padding:'3px 4px'}} value={trackerForm.updateInterval} onChange={e => setTF('updateInterval', parseInt(e.target.value))}><option value={10}>10s</option><option value={30}>30s</option><option value={60}>60s</option><option value={120}>2m</option><option value={300}>5m</option></select></td>
                                    <td><div style={{display:'flex',gap:4}}><button className="btn btn-primary" style={{padding:'4px 8px',fontSize:11}} onClick={() => saveEditTracker(t.id)}>Save</button><button className="btn btn-secondary" style={{padding:'4px 8px',fontSize:11}} onClick={() => setEditingTracker(null)}>Cancel</button></div></td>
                                </tr> :
                                <tr key={t.id}>
                                    <td style={{fontWeight:600,fontSize:12}}>{t.name}<div style={{fontSize:10,color:'#718096'}}>{t.id}</div></td>
                                    <td style={{fontSize:12}}>{t.trackerType}</td>
                                    <td style={{fontSize:11,fontFamily:'monospace'}}>{t.imei}</td>
                                    <td><span style={{padding:'2px 8px',background:t.assignType==='truck'?'#ebf4ff':t.assignType==='load'?'#f0fff4':'#fffbeb',borderRadius:4,fontSize:11,fontWeight:500}}>{t.assignType}: {t.assignedTo}</span></td>
                                    <td><span style={{display:'inline-flex',alignItems:'center',gap:4}}><span style={{width:8,height:8,borderRadius:'50%',background:statusColor(t.status)}}></span><span style={{fontSize:12,fontWeight:500,color:statusColor(t.status)}}>{t.status}</span></span></td>
                                    <td style={{fontSize:12,color:'#718096'}}>{t.lastPing}</td>
                                    <td>{t.battery !== null ? <span style={{fontSize:12,color:t.battery < 30 ? '#c53030' : '#2f855a',fontWeight:500}}>{t.battery}%</span> : <span style={{fontSize:11,color:'#718096'}}>Wired</span>}</td>
                                    <td style={{fontSize:12}}>{t.signal}</td>
                                    <td><div style={{display:'flex',gap:4}}>
                                        <button className="btn btn-secondary" style={{padding:'4px 8px',fontSize:11}} onClick={() => pingTracker(t.id)} title="Ping tracker">Ping</button>
                                        <button className="btn btn-secondary" style={{padding:'4px 8px',fontSize:11}} onClick={() => startEditTracker(t)} title="Edit"><Icons.Edit /></button>
                                        <button className="btn btn-secondary" style={{padding:'4px 8px',fontSize:11,color:'#c53030'}} onClick={() => deleteTracker(t.id)} title="Remove"><Icons.Trash /></button>
                                    </div></td>
                                </tr>
                            ))}
                        </tbody></table>}

                        {/* Quick Setup Guide */}
                        <div style={{marginTop:20,padding:16,background:'#f7fafc',borderRadius:8}}>
                            <h5 style={{fontSize:13,fontWeight:600,marginBottom:10,color:'#1a365d'}}>GPS Tracker Setup Guide</h5>
                            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill, minmax(220px, 1fr))',gap:16}}>
                                <div style={{fontSize:12,lineHeight:1.6}}>
                                    <div style={{fontWeight:600,marginBottom:4,color:'#2d3748'}}>1. Get Your Tracker Ready</div>
                                    <div style={{color:'#4a5568'}}>Power on your GPS device and make sure it has cellular signal. Note the IMEI or serial number printed on the device.</div>
                                </div>
                                <div style={{fontSize:12,lineHeight:1.6}}>
                                    <div style={{fontWeight:600,marginBottom:4,color:'#2d3748'}}>2. Add It Here</div>
                                    <div style={{color:'#4a5568'}}>Click "Add Tracker" above, select your device type, enter the IMEI/serial, and assign it to a truck, load, or container.</div>
                                </div>
                                <div style={{fontSize:12,lineHeight:1.6}}>
                                    <div style={{fontWeight:600,marginBottom:4,color:'#2d3748'}}>3. Install the Device</div>
                                    <div style={{color:'#4a5568'}}>OBD-II: Plug into diagnostic port. Hardwired: Connect to vehicle power. Magnetic: Attach to metal surface on the asset.</div>
                                </div>
                                <div style={{fontSize:12,lineHeight:1.6}}>
                                    <div style={{fontWeight:600,marginBottom:4,color:'#2d3748'}}>4. Verify Connection</div>
                                    <div style={{color:'#4a5568'}}>Hit "Ping" to verify the tracker responds. Once online, it will appear on the fleet map and update at your chosen interval.</div>
                                </div>
                            </div>
                            <div style={{marginTop:14,padding:12,background:'#ebf4ff',borderRadius:6,fontSize:12,color:'#2c5282'}}>
                                <strong>Supported Devices:</strong> Any AGPS / GPS tracker that communicates via TCP/IP, HTTP API, MQTT, or satellite protocol. Popular brands: Queclink, Teltonika, CalAmp, Sierra Wireless, Spot, Garmin inReach.
                            </div>
                        </div>
                    </div>
                </div>
            </div>);
        };

        const DriversPage = ({ setModal, setSelectedDriver, fleet }) => {
            const { drivers } = fleet;
            return (<div className="page"><div className="card"><div className="card-header"><h3>Driver Management</h3><button className="btn btn-primary" onClick={() => setModal('add-driver')}><Icons.Plus /> Add Driver</button></div>
                <table><thead><tr><th>Driver</th><th>Status</th><th>Weeks on Job</th><th>CDL Info</th><th>Safety Score</th><th>Total Miles</th><th>YTD Earnings</th><th>Actions</th></tr></thead><tbody>
                    {drivers.map(d => (<tr key={d.id}><td><div className="driver-card"><div className="avatar"><img src={d.photo} alt="" /></div><div className="driver-info"><div className="name">{d.name}</div><div className="meta">{d.id} | {d.truck}</div></div></div></td><td><StatusBadge status={d.status} /></td><td><strong>{d.weeksOnJob}</strong> weeks<br/><span style={{fontSize:10,color:'#718096'}}>Since {d.hireDate}</span></td><td><div style={{fontSize:12}}>{d.cdlState} Class {d.cdlClass}</div><div style={{fontSize:10,color:'#718096'}}>Exp: {d.cdlExpiry}</div><div style={{fontSize:10}}>{(d.endorsements||[]).join(', ')}</div></td><td><span style={{fontSize:16,fontWeight:700,color:d.safetyScore>=95?'#2f855a':d.safetyScore>=90?'#c05621':'#c53030'}}>{d.safetyScore}</span>/100</td><td>{(d.totalMiles||0).toLocaleString()}</td><td style={{fontWeight:600,color:'#2f855a'}}>${(d.ytdEarnings||0).toLocaleString()}</td><td><button className="btn btn-secondary" onClick={() => { setSelectedDriver(d); setModal('driver-detail'); }}><Icons.Eye /></button></td></tr>))}
                </tbody></table>
            </div></div>);
        };

        const FleetPage = ({ setModal, setSelectedTruck, fleet }) => {
            const { drivers, trucks, loads } = fleet;
            const toast = useToast();
            const [tab, setTab] = useState('trucks');
            // Add Truck form
            const [showAddTruck, setShowAddTruck] = useState(false);
            const emptyTruck = { id: '', unit: '', year: '', make: '', model: '', vin: '', licensePlate: '', plateState: '', color: '', mileage: 0, mpg: 0, engineMake: '', engineModel: '', horsepower: '', transmission: '', fuelCapacity: '', sleeper: '', fifthWheel: '', grossWeight: 0, status: 'active', driver: null, eldProvider: '', eldSerial: '', insurancePolicy: '', insuranceExpiry: '', annualInspection: '', registrationExpiry: '', fuelCardNum: '', purchaseDate: '', purchasePrice: 0, currentValue: 0, nextService: '', plateExpiry: '', notes: '' };
            const [truckForm, setTruckForm] = useState(emptyTruck);
            const setTF = (k, v) => setTruckForm(p => ({ ...p, [k]: v }));
            const saveTruck = async () => {
                if (!truckForm.id && !truckForm.unit) { toast('Truck ID or Unit # required', 'error'); return; }
                if (!truckForm.id) setTruckForm(p => ({ ...p, id: `TRK-${Date.now().toString().slice(-6)}` }));
                try { await fleet.createTruck({ ...truckForm, id: truckForm.id || `TRK-${Date.now().toString().slice(-6)}` }); setShowAddTruck(false); setTruckForm(emptyTruck); } catch(e) {}
            };
            // Clients state (local + persisted in localStorage until Supabase table is created)
            const [clients, setClients] = useState(() => { try { return JSON.parse(localStorage.getItem('fc_clients_' + COMPANY_ID) || '[]'); } catch { return []; } });
            const [showAddClient, setShowAddClient] = useState(false);
            const [editingClient, setEditingClient] = useState(null);
            const emptyClient = { id: '', companyName: '', contactName: '', phone: '', email: '', address: '', city: '', state: '', zip: '', type: 'shipper', industry: '', notes: '', created: '' };
            const [clientForm, setClientForm] = useState(emptyClient);
            const setCF = (k, v) => setClientForm(p => ({ ...p, [k]: v }));
            const saveClient = () => {
                if (!clientForm.companyName.trim()) { toast('Company name required', 'error'); return; }
                if (editingClient) {
                    const updated = clients.map(c => c.id === editingClient ? { ...clientForm } : c);
                    setClients(updated); localStorage.setItem('fc_clients_' + COMPANY_ID, JSON.stringify(updated));
                    setEditingClient(null); toast('Client updated', 'success');
                } else {
                    const newClient = { ...clientForm, id: `CLT-${Date.now().toString().slice(-6)}`, created: new Date().toISOString().split('T')[0] };
                    const updated = [...clients, newClient];
                    setClients(updated); localStorage.setItem('fc_clients_' + COMPANY_ID, JSON.stringify(updated));
                    toast('Client added', 'success');
                }
                setShowAddClient(false); setClientForm(emptyClient);
            };
            const deleteClient = (id) => { if (!confirm('Delete this client?')) return; const updated = clients.filter(c => c.id !== id); setClients(updated); localStorage.setItem('fc_clients_' + COMPANY_ID, JSON.stringify(updated)); toast('Client removed', 'success'); };
            const startEditClient = (c) => { setClientForm({ ...c }); setEditingClient(c.id); setShowAddClient(true); };
            // Routes state
            const [routes, setRoutes] = useState(() => { try { return JSON.parse(localStorage.getItem('fc_routes_' + COMPANY_ID) || '[]'); } catch { return []; } });
            const [showAddRoute, setShowAddRoute] = useState(false);
            const emptyRoute = { id: '', name: '', origin: '', destination: '', miles: 0, avgRate: 0, frequency: 'weekly', client: '', equipment: 'Dry Van 53ft', notes: '' };
            const [routeForm, setRouteForm] = useState(emptyRoute);
            const setRF = (k, v) => setRouteForm(p => ({ ...p, [k]: v }));
            const saveRoute = () => {
                if (!routeForm.origin.trim() || !routeForm.destination.trim()) { toast('Origin and destination required', 'error'); return; }
                const newRoute = { ...routeForm, id: routeForm.id || `RT-${Date.now().toString().slice(-6)}` };
                const updated = routeForm.id && routes.find(r => r.id === routeForm.id) ? routes.map(r => r.id === routeForm.id ? newRoute : r) : [...routes, newRoute];
                setRoutes(updated); localStorage.setItem('fc_routes_' + COMPANY_ID, JSON.stringify(updated));
                setShowAddRoute(false); setRouteForm(emptyRoute); toast(routeForm.id && routes.find(r => r.id === routeForm.id) ? 'Route updated' : 'Route added', 'success');
            };
            const deleteRoute = (id) => { if (!confirm('Delete this route?')) return; const updated = routes.filter(r => r.id !== id); setRoutes(updated); localStorage.setItem('fc_routes_' + COMPANY_ID, JSON.stringify(updated)); toast('Route removed', 'success'); };

            // Get client load counts
            const getClientLoads = (clientName) => loads.filter(l => l.customer === clientName).length;
            const getClientRevenue = (clientName) => loads.filter(l => l.customer === clientName).reduce((s, l) => s + (l.rate || 0), 0);

            return (<div className="page">
                <div className="stats" style={{gridTemplateColumns:'repeat(5,1fr)'}}><div className="stat"><div className="stat-val">{trucks.filter(t => t.status === 'active').length}</div><div className="stat-label">Active Trucks</div></div><div className="stat"><div className="stat-val" style={{color:'#c53030'}}>{trucks.filter(t => t.status === 'maintenance').length}</div><div className="stat-label">In Shop</div></div><div className="stat"><div className="stat-val">{clients.length}</div><div className="stat-label">Clients</div></div><div className="stat"><div className="stat-val">{routes.length}</div><div className="stat-label">Active Routes</div></div><div className="stat"><div className="stat-val">{trucks.reduce((s, t) => s + (t.mileage||0), 0).toLocaleString()}</div><div className="stat-label">Total Fleet Miles</div></div></div>
                <div className="card"><div className="card-header" style={{flexWrap:'wrap',gap:10}}>
                    <div className="tabs" style={{borderBottom:'none',marginBottom:0}}>{[['trucks','Trucks'],['clients','Clients'],['routes','Routes']].map(([k,l]) => <div key={k} className={`tab ${tab===k?'active':''}`} onClick={() => setTab(k)}>{l}</div>)}</div>
                    <div style={{display:'flex',gap:8}}>
                        {tab === 'trucks' && <button className="btn btn-primary" onClick={() => { setTruckForm(emptyTruck); setShowAddTruck(true); }}><Icons.Plus /> Add Truck</button>}
                        {tab === 'clients' && <button className="btn btn-primary" onClick={() => { setClientForm(emptyClient); setEditingClient(null); setShowAddClient(true); }}><Icons.Plus /> Add Client</button>}
                        {tab === 'routes' && <button className="btn btn-primary" onClick={() => { setRouteForm(emptyRoute); setShowAddRoute(true); }}><Icons.Plus /> Add Route</button>}
                    </div>
                </div>

                {/* ADD TRUCK FORM */}
                {tab === 'trucks' && showAddTruck && <div style={{padding:20,background:'#f7fafc',borderBottom:'1px solid #e2e8f0'}}>
                    <h4 style={{fontSize:14,fontWeight:600,marginBottom:14}}>Add New Truck</h4>
                    <div className="form-row-3"><div className="form-group"><label className="form-label">Truck ID</label><input className="form-input" value={truckForm.id} onChange={e => setTF('id', e.target.value)} placeholder="TRK-001" /></div><div className="form-group"><label className="form-label">Unit #</label><input className="form-input" value={truckForm.unit} onChange={e => setTF('unit', e.target.value)} placeholder="101" /></div><div className="form-group"><label className="form-label">Status</label><select className="form-select" value={truckForm.status} onChange={e => setTF('status', e.target.value)}><option value="active">Active</option><option value="maintenance">Maintenance</option><option value="inactive">Inactive</option></select></div></div>
                    <div className="form-row-3"><div className="form-group"><label className="form-label">Year</label><input className="form-input" value={truckForm.year} onChange={e => setTF('year', e.target.value)} placeholder="2024" /></div><div className="form-group"><label className="form-label">Make</label><input className="form-input" value={truckForm.make} onChange={e => setTF('make', e.target.value)} placeholder="Peterbilt" /></div><div className="form-group"><label className="form-label">Model</label><input className="form-input" value={truckForm.model} onChange={e => setTF('model', e.target.value)} placeholder="579" /></div></div>
                    <div className="form-row-3"><div className="form-group"><label className="form-label">VIN</label><input className="form-input" value={truckForm.vin} onChange={e => setTF('vin', e.target.value)} /></div><div className="form-group"><label className="form-label">License Plate</label><input className="form-input" value={truckForm.licensePlate} onChange={e => setTF('licensePlate', e.target.value)} /></div><div className="form-group"><label className="form-label">Plate State</label><input className="form-input" value={truckForm.plateState} onChange={e => setTF('plateState', e.target.value)} placeholder="TX" /></div></div>
                    <div className="form-row-3"><div className="form-group"><label className="form-label">Engine Make</label><input className="form-input" value={truckForm.engineMake} onChange={e => setTF('engineMake', e.target.value)} placeholder="Cummins" /></div><div className="form-group"><label className="form-label">Engine Model</label><input className="form-input" value={truckForm.engineModel} onChange={e => setTF('engineModel', e.target.value)} placeholder="X15" /></div><div className="form-group"><label className="form-label">Horsepower</label><input className="form-input" value={truckForm.horsepower} onChange={e => setTF('horsepower', e.target.value)} placeholder="500" /></div></div>
                    <div className="form-row-3"><div className="form-group"><label className="form-label">Mileage</label><input type="number" className="form-input" value={truckForm.mileage} onChange={e => setTF('mileage', parseInt(e.target.value)||0)} /></div><div className="form-group"><label className="form-label">MPG</label><input type="number" step="0.1" className="form-input" value={truckForm.mpg} onChange={e => setTF('mpg', parseFloat(e.target.value)||0)} /></div><div className="form-group"><label className="form-label">Assign Driver</label><select className="form-select" value={truckForm.driver||''} onChange={e => setTF('driver', e.target.value||null)}><option value="">Unassigned</option>{drivers.map(d => <option key={d.id} value={d.id}>{d.name}</option>)}</select></div></div>
                    <div className="form-row"><div className="form-group"><label className="form-label">ELD Provider</label><input className="form-input" value={truckForm.eldProvider} onChange={e => setTF('eldProvider', e.target.value)} placeholder="Samsara" /></div><div className="form-group"><label className="form-label">Insurance Expiry</label><input type="date" className="form-input" value={truckForm.insuranceExpiry} onChange={e => setTF('insuranceExpiry', e.target.value)} /></div></div>
                    <div className="form-group"><label className="form-label">Notes</label><textarea className="form-input" rows="2" value={truckForm.notes} onChange={e => setTF('notes', e.target.value)}></textarea></div>
                    <div style={{display:'flex',gap:8}}><button className="btn btn-primary" onClick={saveTruck} disabled={fleet.saving}>{fleet.saving ? 'Saving...' : 'Add Truck'}</button><button className="btn btn-secondary" onClick={() => setShowAddTruck(false)}>Cancel</button></div>
                </div>}

                {/* ADD CLIENT FORM */}
                {tab === 'clients' && showAddClient && <div style={{padding:20,background:'#f7fafc',borderBottom:'1px solid #e2e8f0'}}>
                    <h4 style={{fontSize:14,fontWeight:600,marginBottom:14}}>{editingClient ? 'Edit Client' : 'Add New Client'}</h4>
                    <div className="form-row"><div className="form-group"><label className="form-label">Company Name *</label><input className="form-input" value={clientForm.companyName} onChange={e => setCF('companyName', e.target.value)} placeholder="ABC Distribution LLC" /></div><div className="form-group"><label className="form-label">Contact Person</label><input className="form-input" value={clientForm.contactName} onChange={e => setCF('contactName', e.target.value)} /></div></div>
                    <div className="form-row-3"><div className="form-group"><label className="form-label">Phone</label><input className="form-input" value={clientForm.phone} onChange={e => setCF('phone', e.target.value)} /></div><div className="form-group"><label className="form-label">Email</label><input className="form-input" value={clientForm.email} onChange={e => setCF('email', e.target.value)} /></div><div className="form-group"><label className="form-label">Type</label><select className="form-select" value={clientForm.type} onChange={e => setCF('type', e.target.value)}><option value="shipper">Shipper</option><option value="broker">Broker</option><option value="distributor">Distributor</option><option value="manufacturer">Manufacturer</option><option value="retailer">Retailer</option></select></div></div>
                    <div className="form-group"><label className="form-label">Address</label><input className="form-input" value={clientForm.address} onChange={e => setCF('address', e.target.value)} /></div>
                    <div className="form-row-3"><div className="form-group"><label className="form-label">City</label><input className="form-input" value={clientForm.city} onChange={e => setCF('city', e.target.value)} /></div><div className="form-group"><label className="form-label">State</label><input className="form-input" value={clientForm.state} onChange={e => setCF('state', e.target.value)} placeholder="TX" /></div><div className="form-group"><label className="form-label">ZIP</label><input className="form-input" value={clientForm.zip} onChange={e => setCF('zip', e.target.value)} /></div></div>
                    <div className="form-row"><div className="form-group"><label className="form-label">Industry</label><input className="form-input" value={clientForm.industry} onChange={e => setCF('industry', e.target.value)} placeholder="Food & Beverage, Manufacturing, etc." /></div></div>
                    <div className="form-group"><label className="form-label">Notes</label><textarea className="form-input" rows="2" value={clientForm.notes} onChange={e => setCF('notes', e.target.value)}></textarea></div>
                    <div style={{display:'flex',gap:8}}><button className="btn btn-primary" onClick={saveClient}>{editingClient ? 'Update Client' : 'Add Client'}</button><button className="btn btn-secondary" onClick={() => { setShowAddClient(false); setEditingClient(null); }}>Cancel</button></div>
                </div>}

                {/* ADD ROUTE FORM */}
                {tab === 'routes' && showAddRoute && <div style={{padding:20,background:'#f7fafc',borderBottom:'1px solid #e2e8f0'}}>
                    <h4 style={{fontSize:14,fontWeight:600,marginBottom:14}}>Add New Route</h4>
                    <div className="form-row-3"><div className="form-group"><label className="form-label">Route Name</label><input className="form-input" value={routeForm.name} onChange={e => setRF('name', e.target.value)} placeholder="Houston to Dallas" /></div><div className="form-group"><label className="form-label">Origin</label><input className="form-input" value={routeForm.origin} onChange={e => setRF('origin', e.target.value)} placeholder="Houston, TX" /></div><div className="form-group"><label className="form-label">Destination</label><input className="form-input" value={routeForm.destination} onChange={e => setRF('destination', e.target.value)} placeholder="Dallas, TX" /></div></div>

                    <div className="form-group"><label className="form-label">Notes</label><textarea className="form-input" rows="2" value={routeForm.notes} onChange={e => setRF('notes', e.target.value)}></textarea></div>
                    <div style={{display:'flex',gap:8}}><button className="btn btn-primary" onClick={saveRoute}>Save Route</button><button className="btn btn-secondary" onClick={() => setShowAddRoute(false)}>Cancel</button></div>
                </div>}

                {tab === 'trucks' && <div className="grid-2" style={{padding:16}}>{trucks.length === 0 ? <div style={{gridColumn:'1/-1',textAlign:'center',padding:40,color:'#718096'}}>No trucks yet. Add your first truck above.</div> : trucks.map(t => { const d = drivers.find(x => x.id === t.driver); return (<div key={t.id} className="truck-card"><div className="truck-header"><div><div className="truck-id">{t.id} - Unit #{t.unit}</div><StatusBadge status={t.status} /></div><div style={{textAlign:'right',fontSize:12,color:'#718096'}}>{t.year} {t.make}<br/>{t.model}</div></div><div className="truck-details"><div className="truck-detail"><span>VIN</span><span style={{fontSize:11}}>{t.vin}</span></div><div className="truck-detail"><span>License</span><span>{t.licensePlate} ({t.plateState})</span></div><div className="truck-detail"><span>Mileage</span><span>{(t.mileage||0).toLocaleString()} mi</span></div><div className="truck-detail"><span>MPG</span><span>{t.mpg}</span></div><div className="truck-detail"><span>Engine</span><span>{t.engineMake} {t.engineModel}</span></div><div className="truck-detail"><span>HP</span><span>{t.horsepower}</span></div><div className="truck-detail"><span>Driver</span><span>{d?.name || 'Unassigned'}</span></div><div className="truck-detail"><span>Next Service</span><span style={{color:t.nextService==='In Shop'?'#c53030':'inherit'}}>{t.nextService}</span></div><div className="truck-detail"><span>ELD</span><span>{t.eldProvider}</span></div><div className="truck-detail"><span>Annual Insp</span><span>{t.annualInspection}</span></div></div><div style={{marginTop:12,display:'flex',gap:8}}><button className="btn btn-secondary" style={{flex:1}} onClick={() => { setSelectedTruck(t); setModal('truck-detail'); }}><Icons.Eye /> Details</button><button className="btn btn-secondary" style={{flex:1}} onClick={() => { setSelectedTruck(t); setModal('edit-truck'); }}><Icons.Edit /> Edit</button></div></div>); })}</div>}

                ))}</tbody></table>)}

        const InvoicingPage = ({ fleet, setModal }) => {

            const prefillFromLoad = (loadId) => {

            };
            const startCreate = () => {
                const nextNum = `INV-${new Date().getFullYear()}-${String(invoices.length + 1).padStart(3,'0')}`;

            };
            const markPaid = async (inv) => {
                try { await fleet.updateInvoice(inv.dbId, { ...inv, status: 'paid', paid: new Date().toISOString().split('T')[0], paymentMethod: 'ACH' }); } catch(e) {}

                const blob = new Blob([text], {type:'text/plain'});

                html += `<div class="header"><div><h1>INVOICE</h1><div style="font-size:18px;color:#c53030;font-weight:600;margin-top:4px">${inv.id}</div></div><div class="company"><strong>${COMPANY.fullName}</strong><br>${COMPANY.dot} | ${COMPANY.mc}<br>Houston, TX</div></div>`;
                html += `<div class="meta"><div class="meta-box"><div class="meta-label">Bill To</div><div class="meta-value">${inv.customer}</div>${inv.customerAddress ? `<div style="font-size:12px;color:#666;margin-top:2px">${inv.customerAddress}</div>` : ''}</div><div class="meta-box"><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div><div class="meta-label">Invoice Date</div><div class="meta-value">${inv.issued || '-'}</div></div><div><div class="meta-label">Due Date</div><div class="meta-value">${inv.due || '-'}</div></div><div><div class="meta-label">Load #</div><div class="meta-value">${inv.loadId || '-'}</div></div><div><div class="meta-label">Status</div><div class="meta-value">${inv.status.toUpperCase()}</div></div></div></div></div>`;

                html += `<tr><td>Line Haul</td><td style="text-align:right">$${(inv.lineHaul||0).toLocaleString()}</td></tr>`;
                html += `<tr><td>Fuel Surcharge</td><td style="text-align:right">$${(inv.fuelSurcharge||0).toLocaleString()}</td></tr>`;
                html += `<tr><td>Accessorials</td><td style="text-align:right">$${(inv.accessorials||0).toLocaleString()}</td></tr>`;
                html += `<tr><td>Detention</td><td style="text-align:right">$${(inv.detention||0).toLocaleString()}</td></tr>`;
                html += `<tr class="total-row"><td>TOTAL DUE</td><td style="text-align:right">$${(inv.amount||0).toLocaleString()}</td></tr>`;
                html += `</tbody></table>`;

                html += `<div class="footer">Thank you for your business. Payment terms: Net 30. Please remit payment to FleetCommand Pro Demo.</div><div style="margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.08);font-size:12px;color:#64748b;line-height:1.6;text-align:center;max-width:700px;margin-left:auto;margin-right:auto">FleetCommand Pro software is owned and operated by <a href="https://startmybusiness.us" style="color:#94a3b8">Start My Business Inc.</a> -- <a href="https://getfleetcommand.com" style="color:#94a3b8">getfleetcommand.com</a></div>

<img src="fleet-marker.png" alt="FleetCommand Pro" style="height:40px;width:auto">
<span style="color:#94a3b8;font-size:13px">Proudly Powered by <a href="https://getfleetcommand.com" style="color:#ff9800;font-weight:600">FleetCommand Pro</a> Software</span>
</div>
</body></html>`;
                w.document.write(html); w.document.close(); w.print();
            };
            return (<div className="page"><div className="stats" style={{gridTemplateColumns:'repeat(4,1fr)'}}><div className="stat hl"><div className="stat-val">${outstanding.toLocaleString()}</div><div className="stat-label">Outstanding</div></div><div className="stat"><div className="stat-val" style={{color:'#c53030'}}>${overdue.toLocaleString()}</div><div className="stat-label">Overdue</div></div><div className="stat"><div className="stat-val">{invoices.filter(i => i.status === 'pending').length}</div><div className="stat-label">Pending</div></div><div className="stat"><div className="stat-val" style={{color:'#2f855a'}}>{invoices.filter(i => i.status === 'paid').length}</div><div className="stat-label">Paid</div></div></div>
                <div className="card"><div className="card-header"><h3>Invoices</h3><button className="btn btn-primary" onClick={startCreate}><Icons.Plus /> Create Invoice</button></div>

                    <div className="form-row"><div className="form-group"><label className="form-label">Customer</label><input className="form-input" value={form.customer} onChange={e => setF('customer', e.target.value)} /></div><div className="form-group"><label className="form-label">Customer Address</label><input className="form-input" value={form.customerAddress||''} onChange={e => setF('customerAddress', e.target.value)} /></div></div>

                    <div className="form-group"><label className="form-label">Notes</label><textarea className="form-input" rows="2" value={form.notes||''} onChange={e => setF('notes', e.target.value)}></textarea></div>

                </div>}

        const IFTAPage = ({ fleet }) => {

            const totalGallons = iftaData.reduce((s, d) => s + (d.gallons||0), 0);
            const netOwed = iftaData.reduce((s, d) => s + (d.net||0), 0);
            const [quarter, setQuarter] = useState('Q4 2024');
            const exportCSV = () => {
                let csv = 'State,Miles,Gallons,Tax Rate,Tax Owed,Tax Paid,Net\n';
                iftaData.forEach(r => { csv += `${r.state},${r.miles},${r.gallons},${r.taxRate},${r.taxOwed},${r.taxPaid},${r.net}\n`; });
                csv += `TOTAL,${totalMiles},${totalGallons.toFixed(1)},-,${iftaData.reduce((s,d)=>s+(d.taxOwed||0),0).toFixed(2)},${iftaData.reduce((s,d)=>s+(d.taxPaid||0),0).toFixed(2)},${netOwed.toFixed(2)}\n`;
                const blob = new Blob([csv], {type:'text/csv'});
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `IFTA-${quarter.replace(' ','-')}-${COMPANY.name.replace(/\s+/g,'_')}.csv`; a.click();
                toast('IFTA report exported as CSV', 'success');
            };
            const printReport = () => {
                const printWin = window.open('', '_blank');
                let html = `<html><head><title>IFTA Report - ${quarter}</title><style>body{font-family:Arial,sans-serif;padding:20px}h1{font-size:18px}h2{font-size:14px;color:#666}table{width:100%;border-collapse:collapse;margin-top:16px}th,td{padding:8px 12px;border:1px solid #ddd;text-align:left;font-size:13px}th{background:#f0f0f0;font-weight:600}tfoot td{font-weight:700;background:#f7f7f7}.company{font-size:12px;color:#666;margin-bottom:20px}</style></head><body>`;
                html += `<h1>IFTA Quarterly Fuel Tax Report</h1><div class="company">${COMPANY.fullName} | ${COMPANY.dot} | ${COMPANY.mc}</div><h2>${quarter}</h2>`;
                html += '<table><thead><tr><th>State</th><th>Miles</th><th>Gallons</th><th>Tax Rate</th><th>Tax Owed</th><th>Tax Paid</th><th>Net</th></tr></thead><tbody>';

                    </div>

                    <div style={{display:'flex',gap:8,marginTop:12}}><button className="btn btn-primary" onClick={handleUpload} disabled={uploading || !selectedFile}>{uploading ? 'Uploading...' : 'Upload Document'}</button><button className="btn btn-secondary" onClick={() => { setShowUpload(false); setSelectedFile(null); setUploadName(''); if(fileInputRef.current) fileInputRef.current.value=''; }}>Cancel</button></div>

() => handlePrint(d)} title="Print"><Icons.Print /></button><button className="btn btn-secondary" style={{padding:'6px 8px'}} onClick={() => startEdit(d)} title="Edit"><Icons.Edit /></button><button className="btn btn-secondary" style={{padding:'6px 8px',color:'#c53030'}} onClick={() => handleDelete(d.id)} title="Delete"><Icons.Trash /></button></div></>}</div>))}</div>}</div></div></div>);

        const ReportsPage = ({ fleet }) => {
            const { drivers, trucks, loads, invoices, iftaData } = fleet;
            const toast = useToast();
            const [reportType, setReportType] = useState('revenue');
            const [dateRange, setDateRange] = useState('month');
            const [startDate, setStartDate] = useState(new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split('T')[0]);
            const [endDate, setEndDate] = useState(new Date().toISOString().split('T')[0]);
            const [generatedReports, setGeneratedReports] = useState([]);
            const [viewingReport, setViewingReport] = useState(null);

            const getDateRange = () => {
                const now = new Date();
                let s, e;
                if (dateRange === 'custom') return { start: startDate, end: endDate };
                e = now.toISOString().split('T')[0];
                if (dateRange === 'week') { s = new Date(now - 7*86400000); }
                else if (dateRange === 'month') { s = new Date(now.getFullYear(), now.getMonth(), 1); }
                else if (dateRange === 'quarter') { const qm = Math.floor(now.getMonth()/3)*3; s = new Date(now.getFullYear(), qm, 1); }
                else { s = new Date(now.getFullYear(), 0, 1); }
                return { start: s.toISOString().split('T')[0], end: e };
            };

            const generateReportData = () => {
                const { start, end } = getDateRange();
                const periodLabel = `${start} to ${end}`;
                let title = '', headers = [], rows = [], summary = [];

                if (reportType === 'revenue') {
                    title = 'Revenue Report';
                    headers = ['Invoice #', 'Customer', 'Load', 'Amount', 'Status', 'Issue Date', 'Due Date'];
                    rows = invoices.map(i => [i.id, i.customer, i.loadId || '-', `$${(i.amount||0).toLocaleString()}`, i.status, i.issued || '-', i.due || '-']);
                    const totalRev = invoices.reduce((s,i) => s + (i.amount||0), 0);
                    const paidRev = invoices.filter(i => i.status === 'paid').reduce((s,i) => s + (i.amount||0), 0);
                    const pendingRev = invoices.filter(i => i.status !== 'paid').reduce((s,i) => s + (i.amount||0), 0);
                    summary = [`Total Revenue: $${totalRev.toLocaleString()}`, `Collected: $${paidRev.toLocaleString()}`, `Outstanding: $${pendingRev.toLocaleString()}`, `Invoices: ${invoices.length}`];
                } else if (reportType === 'mileage') {
                    title = 'Mileage Report';
                    headers = ['Load #', 'Origin', 'Destination', 'Miles', 'Driver', 'Status'];
                    rows = loads.map(l => [l.id, l.origin || '-', l.destination || '-', l.miles || 0, l.driver || '-', l.status]);
                    const totalMiles = loads.reduce((s,l) => s + (l.miles||0), 0);
                    summary = [`Total Miles: ${totalMiles.toLocaleString()}`, `Loads: ${loads.length}`, `Avg Miles/Load: ${loads.length ? Math.round(totalMiles/loads.length) : 0}`];
                } else if (reportType === 'driver') {
                    title = 'Driver Performance Report';
                    headers = ['Driver', 'CDL #', 'Status', 'Loads Assigned', 'Total Miles', 'Revenue Generated'];
                    rows = drivers.map(d => {
                        const driverLoads = loads.filter(l => l.driver === d.name || l.driverId === d.id);
                        const driverMiles = driverLoads.reduce((s,l) => s + (l.miles||0), 0);
                        const driverRev = driverLoads.reduce((s,l) => s + (l.rate||0), 0);
                        return [d.name, d.cdlNumber || '-', d.status, driverLoads.length, driverMiles.toLocaleString(), `$${driverRev.toLocaleString()}`];
                    });
                    summary = [`Total Drivers: ${drivers.length}`, `Active: ${drivers.filter(d => d.status === 'active').length}`, `Off Duty: ${drivers.filter(d => d.status !== 'active').length}`];
                } else if (reportType === 'fleet') {
                    title = 'Fleet Utilization Report';
                    headers = ['Unit #', 'Type', 'Year/Make/Model', 'Status', 'Mileage', 'Loads Hauled'];
                    rows = trucks.map(t => {
                        const truckLoads = loads.filter(l => l.truckId === t.id || l.truck === t.unitNumber);
                        return [t.unitNumber || t.id, t.type || '-', `${t.year||''} ${t.make||''} ${t.model||''}`.trim() || '-', t.status, (t.mileage||0).toLocaleString(), truckLoads.length];
                    });
                    const activeCount = trucks.filter(t => t.status === 'active').length;
                    summary = [`Total Units: ${trucks.length}`, `Active: ${activeCount}`, `Utilization: ${trucks.length ? Math.round(activeCount/trucks.length*100) : 0}%`];
                } else if (reportType === 'customer') {
                    title = 'Customer Analysis Report';
                    headers = ['Customer', 'Loads', 'Total Revenue', 'Avg Rate', 'Avg Miles'];
                    const customerMap = {};
                    loads.forEach(l => {
                        const c = l.customer || 'Unknown';
                        if (!customerMap[c]) customerMap[c] = { loads: 0, revenue: 0, miles: 0 };
                        customerMap[c].loads++;
                        customerMap[c].revenue += (l.rate || 0);
                        customerMap[c].miles += (l.miles || 0);
                    });
                    rows = Object.entries(customerMap).map(([name, d]) => [name, d.loads, `$${d.revenue.toLocaleString()}`, `$${d.loads ? Math.round(d.revenue/d.loads) : 0}`, d.loads ? Math.round(d.miles/d.loads) : 0]);
                    summary = [`Unique Customers: ${Object.keys(customerMap).length}`, `Total Loads: ${loads.length}`];
                } else if (reportType === 'expense') {
                    title = 'Expense Report';
                    headers = ['Category', 'Description', 'Amount', 'Per Mile'];
                    const totalMiles = loads.reduce((s,l) => s + (l.miles||0), 0) || 1;
                    const fuelCost = totalMiles * 0.62;
                    const insuranceCost = totalMiles * 0.09;
                    const maintCost = totalMiles * 0.12;
                    const tireCost = totalMiles * 0.04;
                    const permitCost = totalMiles * 0.015;
                    const expenses = [['Fuel', 'Estimated fuel cost', fuelCost, 0.62], ['Insurance', 'Primary + cargo insurance', insuranceCost, 0.09], ['Maintenance', 'Preventive + repairs', maintCost, 0.12], ['Tires', 'Replacement + retreads', tireCost, 0.04], ['Permits & Licenses', 'Operating permits, IFTA, IRP', permitCost, 0.015]];
                    rows = expenses.map(([cat, desc, amt, pm]) => [cat, desc, `$${Math.round(amt).toLocaleString()}`, `$${pm.toFixed(3)}`]);
                    const totalExp = expenses.reduce((s,e) => s + e[2], 0);
                    summary = [`Total Estimated Expenses: $${Math.round(totalExp).toLocaleString()}`, `Cost Per Mile: $${(totalExp/totalMiles).toFixed(3)}`, `Based on ${totalMiles.toLocaleString()} miles`];
                } else if (reportType === 'profit') {
                    title = 'Profit & Loss Report';
                    headers = ['Line Item', 'Amount'];
                    const totalRev = invoices.reduce((s,i) => s + (i.amount||0), 0);
                    const totalMiles = loads.reduce((s,l) => s + (l.miles||0), 0) || 1;
                    const fuelCost = totalMiles * 0.62;
                    const insuranceCost = totalMiles * 0.09;
                    const maintCost = totalMiles * 0.12;
                    const tireCost = totalMiles * 0.04;
                    const otherCost = totalMiles * 0.05;
                    const totalExp = fuelCost + insuranceCost + maintCost + tireCost + otherCost;
                    const profit = totalRev - totalExp;
                    rows = [['Revenue (Invoiced)', `$${totalRev.toLocaleString()}`], ['---', '---'], ['Fuel', `-$${Math.round(fuelCost).toLocaleString()}`], ['Insurance', `-$${Math.round(insuranceCost).toLocaleString()}`], ['Maintenance', `-$${Math.round(maintCost).toLocaleString()}`], ['Tires', `-$${Math.round(tireCost).toLocaleString()}`], ['Other Operating', `-$${Math.round(otherCost).toLocaleString()}`], ['---', '---'], ['Total Expenses', `-$${Math.round(totalExp).toLocaleString()}`], ['NET PROFIT', `$${Math.round(profit).toLocaleString()}`]];
                    summary = [`Revenue: $${totalRev.toLocaleString()}`, `Expenses: $${Math.round(totalExp).toLocaleString()}`, `Net Profit: $${Math.round(profit).toLocaleString()}`, `Margin: ${totalRev ? Math.round(profit/totalRev*100) : 0}%`];
                } else if (reportType === 'ifta') {
                    title = 'IFTA Summary Report';
                    headers = ['State', 'Miles', 'Gallons', 'Tax Rate', 'Tax Owed', 'Tax Paid', 'Net'];
                    rows = iftaData.map(r => [r.state, (r.miles||0).toLocaleString(), (r.gallons||0).toFixed(1), `$${(r.taxRate||0).toFixed(2)}`, `$${(r.taxOwed||0).toFixed(2)}`, `$${(r.taxPaid||0).toFixed(2)}`, `$${(r.net||0).toFixed(2)}`]);
                    const totalMiles = iftaData.reduce((s,d) => s + (d.miles||0), 0);
                    const totalGal = iftaData.reduce((s,d) => s + (d.gallons||0), 0);
                    const netOwed = iftaData.reduce((s,d) => s + (d.net||0), 0);
                    summary = [`Total Miles: ${totalMiles.toLocaleString()}`, `Total Gallons: ${totalGal.toFixed(0)}`, `Avg MPG: ${totalGal > 0 ? (totalMiles/totalGal).toFixed(2) : 'N/A'}`, `Net Tax: $${Math.abs(netOwed).toFixed(2)} ${netOwed < 0 ? '(credit)' : '(owed)'}`];
                }

                return { title, headers, rows, summary, period: periodLabel, generated: new Date().toISOString().split('T')[0], type: reportType };
            };

            const generateReport = () => {
                const report = generateReportData();
                setGeneratedReports(prev => [report, ...prev]);
                setViewingReport(report);
                toast(`${report.title} generated`, 'success');
